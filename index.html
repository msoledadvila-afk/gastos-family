// CIERRES — cuarto jueves de cada mes
// ─────────────────────────────────────────────
const CIERRES = [
  new Date(2026,3,23), new Date(2026,4,28), new Date(2026,5,25),
  new Date(2026,6,23), new Date(2026,7,27), new Date(2026,8,24),
  new Date(2026,9,22), new Date(2026,10,26), new Date(2026,11,24),
  new Date(2027,0,28), new Date(2027,1,25), new Date(2027,2,25),
];
const MESES_L = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MESES_C = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

function periodoDecierre(fecha) {
  const d = fecha instanceof Date ? fecha : new Date(fecha);
  for (let i = 0; i < CIERRES.length; i++) {
    if (d <= CIERRES[i]) return { label: MESES_C[CIERRES[i].getMonth()]+' '+CIERRES[i].getFullYear(), cierre: CIERRES[i], idx: i };
  }
  const last = CIERRES[CIERRES.length-1];
  return { label:'Mar 2027+', cierre:last, idx:CIERRES.length-1 };
}
function proximoCierreCuota(item) {
  const [y,m,d] = String(item.fecha_primera_cuota).split('-').map(Number);
  return periodoDecierre(new Date(y, m-1+parseInt(item.cuotas_pagadas), d));
}
function cierreActual() {
  const hoy = new Date();
  for (let i = 0; i < CIERRES.length; i++) {
    if (hoy <= CIERRES[i]) return { label:MESES_C[CIERRES[i].getMonth()]+' '+CIERRES[i].getFullYear(), cierre:CIERRES[i], idx:i };
  }
  return periodoDecierre(CIERRES[CIERRES.length-1]);
}
function mesActual() {
  const hoy = new Date();
  return MESES_L[hoy.getMonth()] + ' ' + hoy.getFullYear();
}
function alertaCierre(fechaStr) {
  const fecha = new Date(fechaStr+'T12:00:00');
  const { cierre } = cierreActual();
  const diff = (cierre - fecha) / 86400000;
  if (diff >= 0 && diff <= 3) return `⚠ Cierra en ${Math.round(diff)}d — entra en ${periodoDecierre(fecha).label}`;
  if (diff < 0 && diff >= -1) return `⚠ Pasó el cierre — entra en período siguiente`;
  return null;
}

async function api(params, method='GET', body=null) {
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), 15000);
  try {
    const url = EP+'?'+new URLSearchParams(params).toString();
    const opts = { method, signal:ctrl.signal, redirect:'follow' };
    if (method==='POST'&&body) { opts.headers={'Content-Type':'application/x-www-form-urlencoded'}; opts.body=new URLSearchParams({data:JSON.stringify(body)}).toString(); }
    const res = await fetch(url, opts);
    return await res.json();
  } finally { clearTimeout(t); }
}

// ─────────────────────────────────────────────
// Progress Ring
// ─────────────────────────────────────────────
const Ring = ({pagadas,totales,size=52}) => {
  const pct = totales>0?pagadas/totales:0;
  const r=(size-8)/2, circ=2*Math.PI*r, dash=circ*(1-pct);
  const color=pct>=1?'var(--green)':pct>=0.6?'var(--yellow)':'var(--accent)';
  return (
    <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--surface2)" strokeWidth="4"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="4"
          strokeDasharray={circ} strokeDashoffset={dash} strokeLinecap="round"
          style={{transition:'stroke-dashoffset 0.5s ease'}}/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <span className="mono" style={{fontSize:10,fontWeight:500,color}}>{pagadas}/{totales}</span>
      </div>
    </div>
  );
};

const MEDIOS_TARJETA = ['VISA BNA','VISA PATAGONIA','MC PATAGONIA','VISA PATAGONIA (Gabi)'];
const TODOS_MEDIOS = ['Efectivo','Débito','Transferencia','VISA BNA','VISA PATAGONIA','MC PATAGONIA','VISA PATAGONIA (Gabi)','Otros'];

const FormGastoVar = ({onSubmit,loading}) => {
  const [f,setF]=useState({fecha:today(),descripcion:'',categoria:'Otros',monto:'',titular:'Soledad',medio_pago:'Efectivo',cuotas:'1'});
  const ch=(k,v)=>setF(p=>({...p,[k]:v}));
  const esTarjeta = MEDIOS_TARJETA.includes(f.medio_pago);
  const nCuotas = parseInt(f.cuotas)||1;
  const montoTotal = parseFloat(f.monto)||0;
  const montoCuota = esTarjeta && nCuotas>1 && montoTotal>0 ? montoTotal/nCuotas : null;

  const infoCierre=useMemo(()=>{
    if(!f.fecha)return null;
    const p=periodoDecierre(new Date(f.fecha+'T12:00:00'));
    const a=alertaCierre(f.fecha);
    return{p,a};
  },[f.fecha]);

  const handleSubmit = e => {
    e.preventDefault();
    if(esTarjeta && nCuotas>1) {
      // Guardar como cuota activa
      onSubmit({
        action:'addCuota',
        descripcion:f.descripcion,
        tarjeta: f.medio_pago==='VISA PATAGONIA (Gabi)'?'VISA PATAGONIA':f.medio_pago,
        titular: f.medio_pago==='VISA PATAGONIA (Gabi)'?'Gabriel':f.titular,
        monto_cuota: montoTotal/nCuotas,
        cuotas_totales: nCuotas,
        cuotas_pagadas: 0,
        fecha_primera_cuota: f.fecha,
        categoria: f.categoria,
      });
    } else {
      // Guardar como gasto variable normal
      onSubmit({action:'addGastoMes', fecha:f.fecha, descripcion:f.descripcion, categoria:f.categoria,
        monto:montoTotal, titular: f.medio_pago==='VISA PATAGONIA (Gabi)'?'Gabriel':f.titular,
        medio_pago:f.medio_pago, notas:''});
    }
  };

  return (
    <form onSubmit={handleSubmit} style={{display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <input type="date" value={f.fecha} onChange={e=>ch('fecha',e.target.value)}/>
        <input required type="number" step="0.01" placeholder="Monto total $" value={f.monto} onChange={e=>ch('monto',e.target.value)}/>
      </div>
      {infoCierre&&<div style={{background:infoCierre.a?'rgba(251,191,36,0.1)':'rgba(124,106,247,0.07)',border:`1px solid ${infoCierre.a?'rgba(251,191,36,0.3)':'rgba(124,106,247,0.15)'}`,borderRadius:8,padding:'7px 11px',fontSize:11,color:infoCierre.a?'var(--yellow)':'var(--muted)'}}>
        {infoCierre.a||`→ Entra en resumen ${infoCierre.p.label}`}
      </div>}
      <input required placeholder="Descripción..." value={f.descripcion} onChange={e=>ch('descripcion',e.target.value)}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <select value={f.categoria} onChange={e=>ch('categoria',e.target.value)}>
          {[...CATS_CUOTA,...CATS_FIJO,'Comidas','Entretenimiento'].filter((v,i,a)=>a.indexOf(v)===i).map(c=><option key={c}>{c}</option>)}
        </select>
        <select value={f.titular} onChange={e=>ch('titular',e.target.value)}>
          <option>Soledad</option><option>Gabriel</option><option>Compartido</option>
        </select>
      </div>
      <div>
        <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:3}}>Medio de pago</label>
        <select value={f.medio_pago} onChange={e=>ch('medio_pago',e.target.value)}>
          {TODOS_MEDIOS.map(m=><option key={m}>{m}</option>)}
        </select>
      </div>
      {esTarjeta&&(
        <div>
          <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:3}}>Cantidad de cuotas</label>
          <select value={f.cuotas} onChange={e=>ch('cuotas',e.target.value)}>
            {[1,2,3,4,6,9,12,18,24].map(n=><option key={n} value={n}>{n===1?'1 pago':n+' cuotas'}</option>)}
          </select>
        </div>
      )}
      {montoCuota&&(
        <div style={{background:'rgba(124,106,247,0.08)',border:'1px solid rgba(124,106,247,0.2)',borderRadius:8,padding:'9px 13px',display:'flex',justifyContent:'space-between',fontSize:12}}>
          <span style={{color:'var(--muted)'}}>{nCuotas} cuotas de:</span>
          <span className="mono" style={{fontWeight:700,color:'var(--accent)'}}>{fmt(montoCuota)}</span>
        </div>
      )}
      {esTarjeta&&nCuotas>1&&(
        <p style={{fontSize:11,color:'var(--accent)',background:'rgba(124,106,247,0.06)',padding:'6px 10px',borderRadius:7}}>
          💳 Se guardará como cuota activa en la solapa Cuotas, distribuida por cierre de tarjeta

      )}
      <button type="submit" className="btn-primary" disabled={loading}>{loading?<Spinner/>:'Registrar'}</button>
    </form>
  );
};

const Dashboard = ({cuotas,prestamos,gastosFijos,gastosMes,ingresos,onSetIngreso}) => {
  const actual = cierreActual();
  const siguienteIdx = actual.idx+1;
  const siguienteLabel = CIERRES[siguienteIdx]?MESES_C[CIERRES[siguienteIdx].getMonth()]+' '+CIERRES[siguienteIdx].getFullYear():'—';

  // Cuotas por cierre actual, separadas por titular
  const cuotasActualSole = useMemo(()=>cuotas.filter(c=>c.activa==='SI'&&c.titular==='Soledad'&&parseInt(c.cuotas_pagadas)<parseInt(c.cuotas_totales)&&proximoCierreCuota(c).idx===actual.idx).reduce((s,c)=>s+parseFloat(c.monto_cuota),0),[cuotas,actual]);
  const cuotasActualGabi = useMemo(()=>cuotas.filter(c=>c.activa==='SI'&&c.titular==='Gabriel'&&parseInt(c.cuotas_pagadas)<parseInt(c.cuotas_totales)&&proximoCierreCuota(c).idx===actual.idx).reduce((s,c)=>s+parseFloat(c.monto_cuota),0),[cuotas,actual]);

  // Fijos pendientes (no pagados este mes)
  const fijosPendientes = useMemo(()=>gastosFijos.filter(g=>g.activo==='SI'&&(g.pagado==='NO'||!g.pagado)),[gastosFijos]);
  const totalFijos = useMemo(()=>gastosFijos.filter(g=>g.activo==='SI').reduce((s,g)=>s+parseFloat(g.monto||0),0),[gastosFijos]);

  // Gastos variables del mes
  const varSole = useMemo(()=>gastosMes.filter(g=>g.titular==='Soledad').reduce((s,g)=>s+parseFloat(g.monto||0),0),[gastosMes]);
  const varGabi = useMemo(()=>gastosMes.filter(g=>g.titular==='Gabriel').reduce((s,g)=>s+parseFloat(g.monto||0),0),[gastosMes]);
  const varComp = useMemo(()=>gastosMes.filter(g=>g.titular==='Compartido').reduce((s,g)=>s+parseFloat(g.monto||0),0),[gastosMes]);

  // Préstamo
  const prestamoMes = useMemo(()=>prestamos.filter(p=>p.activo==='SI'&&parseInt(p.cuotas_pagadas)<parseInt(p.cuotas_totales)).reduce((s,p)=>s+parseFloat(p.monto_cuota),0),[prestamos]);

  // Total egresos
  const egresosComp = cuotasActualSole+cuotasActualGabi+totalFijos+varSole+varGabi+varComp+prestamoMes;
  const ingresosComp = (parseFloat(ingresos.sole)||0)+(parseFloat(ingresos.gabi)||0);
  const balance = ingresosComp - egresosComp;

  const Block = ({label,value,color,sub})=>(
    <div style={{flex:1,minWidth:120,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:'12px 14px'}}>
      <p style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>{label}</p>
      <p className="mono" style={{fontSize:20,fontWeight:700,color}}>{fmt(value)}</p>
      {sub&&<p style={{fontSize:10,color:'var(--muted)',marginTop:3}}>{sub}</p>}
    </div>
  );

  return (
    <div style={{display:'flex',flexDirection:'column',gap:14}}>

      {/* INGRESOS */}
      <div className="card">
        <p style={{fontWeight:700,fontSize:13,marginBottom:12,color:'var(--green)'}}>💰 Ingresos</p>
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          <div style={{flex:1,minWidth:120}}>
            <label style={{fontSize:11,color:'var(--sole)',fontWeight:600,display:'block',marginBottom:4}}>Sole</label>
            <input type="number" placeholder="$ ingresos" value={ingresos.sole} onChange={e=>onSetIngreso('sole',e.target.value)}
              style={{background:'var(--surface2)',border:'1px solid rgba(192,132,252,0.3)',color:'var(--text)',borderRadius:8,padding:'8px 12px',width:'100%',fontFamily:'DM Mono',fontSize:14}}/>
          </div>
          <div style={{flex:1,minWidth:120}}>
            <label style={{fontSize:11,color:'var(--gabi)',fontWeight:600,display:'block',marginBottom:4}}>Gabi</label>
            <input type="number" placeholder="$ ingresos" value={ingresos.gabi} onChange={e=>onSetIngreso('gabi',e.target.value)}
              style={{background:'var(--surface2)',border:'1px solid rgba(56,189,248,0.3)',color:'var(--text)',borderRadius:8,padding:'8px 12px',width:'100%',fontFamily:'DM Mono',fontSize:14}}/>
          </div>
        </div>
        {ingresosComp>0&&<div style={{marginTop:10,display:'flex',justifyContent:'space-between',fontSize:12,color:'var(--muted)',borderTop:'1px solid var(--border)',paddingTop:10}}>
          <span>Total compartido</span>
          <span className="mono" style={{fontWeight:700,color:'var(--green)'}}>{fmt(ingresosComp)}</span>
        </div>}
      </div>

      {/* CIERRE ACTUAL — Sole | Gabi */}
      <div className="card" style={{borderColor:'rgba(251,191,36,0.35)',background:'rgba(251,191,36,0.04)'}}>
        <p style={{fontSize:11,color:'var(--yellow)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:10}}>
          Cierre {actual.label} · {actual.cierre.toLocaleDateString('es-AR',{day:'numeric',month:'short'})}
        </p>
        <div style={{display:'flex',gap:10}}>
          <div style={{flex:1,background:'rgba(192,132,252,0.08)',border:'1px solid rgba(192,132,252,0.2)',borderRadius:10,padding:'10px 12px'}}>
            <p style={{fontSize:10,color:'var(--sole)',fontWeight:600,marginBottom:4}}>SOLE</p>
            <p className="mono" style={{fontSize:18,fontWeight:700,color:'var(--sole)'}}>{fmt(cuotasActualSole)}</p>
          </div>
          <div style={{flex:1,background:'rgba(56,189,248,0.08)',border:'1px solid rgba(56,189,248,0.2)',borderRadius:10,padding:'10px 12px'}}>
            <p style={{fontSize:10,color:'var(--gabi)',fontWeight:600,marginBottom:4}}>GABI</p>
            <p className="mono" style={{fontSize:18,fontWeight:700,color:'var(--gabi)'}}>{fmt(cuotasActualGabi)}</p>
          </div>
        </div>
      </div>

      {/* FIJOS */}
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <p style={{fontWeight:700,fontSize:13}}>📋 Fijos mensuales</p>
          <span className="mono" style={{fontWeight:700,color:'var(--yellow)',fontSize:14}}>{fmt(totalFijos)}</span>
        </div>
        {fijosPendientes.length>0&&(
          <div>
            <p style={{fontSize:11,color:'var(--red)',fontWeight:600,marginBottom:7}}>⚠ Pendientes de pago:</p>
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              {fijosPendientes.map(g=>(
                <div key={g.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 10px',background:'rgba(244,63,94,0.05)',border:'1px solid rgba(244,63,94,0.15)',borderRadius:8}}>
                  <span style={{fontSize:12,fontWeight:600}}>{g.descripcion}</span>
                  <span className="mono" style={{fontSize:12,color:'var(--red)'}}>{fmt(g.monto)}</span>
                </div>
              ))}
            </div>
          </div>
        )}
        {fijosPendientes.length===0&&gastosFijos.filter(g=>g.activo==='SI').length>0&&<p style={{fontSize:12,color:'var(--green)'}}>✓ Todos los fijos del mes pagados</p>}
      </div>

      {/* GASTOS VARIABLES */}
      <div className="card">
        <p style={{fontWeight:700,fontSize:13,marginBottom:10}}>🧾 Gastos variables del mes</p>
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          <div style={{flex:1,minWidth:100,background:'rgba(192,132,252,0.07)',border:'1px solid rgba(192,132,252,0.15)',borderRadius:10,padding:'9px 11px'}}>
            <p style={{fontSize:10,color:'var(--sole)',fontWeight:600,marginBottom:3}}>SOLE</p>
            <p className="mono" style={{fontSize:16,fontWeight:700,color:'var(--sole)'}}>{fmt(varSole)}</p>
          </div>
          <div style={{flex:1,minWidth:100,background:'rgba(56,189,248,0.07)',border:'1px solid rgba(56,189,248,0.15)',borderRadius:10,padding:'9px 11px'}}>
            <p style={{fontSize:10,color:'var(--gabi)',fontWeight:600,marginBottom:3}}>GABI</p>
            <p className="mono" style={{fontSize:16,fontWeight:700,color:'var(--gabi)'}}>{fmt(varGabi)}</p>
          </div>
          {varComp>0&&<div style={{flex:1,minWidth:100,background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:10,padding:'9px 11px'}}>
            <p style={{fontSize:10,color:'var(--muted)',fontWeight:600,marginBottom:3}}>COMPARTIDO</p>
            <p className="mono" style={{fontSize:16,fontWeight:700}}>{fmt(varComp)}</p>
          </div>}
        </div>
      </div>

      {/* BALANCE */}
      <div className="card" style={{borderColor:balance>=0?'rgba(34,211,160,0.4)':'rgba(244,63,94,0.4)',background:balance>=0?'rgba(34,211,160,0.05)':'rgba(244,63,94,0.05)'}}>
        <p style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>Balance del mes</p>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:12,color:'var(--muted)',marginBottom:4}}>
          <span>Ingresos compartidos</span>
          <span className="mono" style={{color:'var(--green)'}}>{fmt(ingresosComp)}</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:12,color:'var(--muted)',marginBottom:10}}>
          <span>Egresos estimados</span>
          <span className="mono" style={{color:'var(--red)'}}>{fmt(egresosComp)}</span>
        </div>
        <div style={{borderTop:'1px solid var(--border)',paddingTop:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontWeight:700,fontSize:14}}>= Resultado</span>
          <span className="mono" style={{fontSize:22,fontWeight:800,color:balance>=0?'var(--green)':'var(--red)'}}>{fmt(balance)}</span>
        </div>
        {ingresosComp===0&&<p style={{fontSize:11,color:'var(--muted)',marginTop:8}}>Ingresá los sueldos arriba para ver el balance real</p>}
      </div>

    </div>
  );
};

// ─────────────────────────────────────────────
// Tab Cuotas (componente propio para poder usar useState)
// ─────────────────────────────────────────────
const TabCuotas = ({cuotasActivas,cuotasTerminadas,onPagar,onDelete,onAdd}) => {
  const [ft,setFt]=useState('Todos');
  const titulares=[...new Set(cuotasActivas.map(c=>c.titular))].filter(Boolean);
  const fil=ft==='Todos'?cuotasActivas:cuotasActivas.filter(c=>c.titular===ft);
  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <h2 style={{fontWeight:700,fontSize:15}}>Cuotas activas <span className="badge" style={{background:'rgba(124,106,247,0.15)',color:'var(--accent)',marginLeft:6}}>{cuotasActivas.length}</span></h2>
        <button onClick={onAdd} style={{background:'var(--accent)',border:'none',color:'white',borderRadius:9,padding:'6px 12px',cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:'inherit',display:'flex',alignItems:'center',gap:4}}><Ic.Plus/>Nueva</button>
      </div>
      {titulares.length>1&&(
        <div style={{display:'flex',gap:7,marginBottom:12,flexWrap:'wrap'}}>
          {['Todos',...titulares].map(t=>(
            <button key={t} onClick={()=>setFt(t)} style={{padding:'4px 12px',borderRadius:99,fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit',background:ft===t?'var(--accent)':'var(--surface2)',color:ft===t?'white':'var(--muted)',border:`1px solid ${ft===t?'var(--accent)':'var(--border)'}`}}>{t}</button>
          ))}
        </div>
      )}
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {fil.length===0&&<p style={{color:'var(--muted)',fontSize:13,textAlign:'center',padding:28}}>No hay cuotas activas</p>}
        {fil.map(c=><CuotaCard key={c.id} item={c} onPagar={onPagar} onDelete={onDelete}/>)}
      </div>
      {cuotasTerminadas.length>0&&(
        <div style={{marginTop:20}}>
          <p style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>Finalizadas</p>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {cuotasTerminadas.map(c=><CuotaCard key={c.id} item={c} onPagar={onPagar} onDelete={onDelete}/>)}
          </div>
        </div>
      )}
    </div>
  );
};

// ─────────────────────────────────────────────
// APP
// ─────────────────────────────────────────────
function App() {
  const [tab,setTab]=useState('dashboard');
  const [cuotas,setCuotas]=useState([]);
  const [prestamos,setPrestamos]=useState([]);
  const [gastosFijos,setGastosFijos]=useState([]);
  const [gastosMes,setGastosMes]=useState([]);
  const [ingresos,setIngresos]=useState({sole:'',gabi:''});
  const [loading,setLoading]=useState(false);
  const [saving,setSaving]=useState(false);
  const [modal,setModal]=useState(null);
  const [error,setError]=useState(null);

  const load = useCallback(async()=>{
    setLoading(true); setError(null);
    try {
      const [c,p,f,g,cfg]=await Promise.all([
        api({action:'getCuotas'}),api({action:'getPrestamos'}),
        api({action:'getGastosFijos'}),api({action:'getGastosMes'}),
        api({action:'getConfig'}),
      ]);
      setCuotas(Array.isArray(c)&&c.length>0?c:DATOS_REALES.cuotas);
      setPrestamos(Array.isArray(p)&&p.length>0?p:DATOS_REALES.prestamos);
      setGastosFijos(Array.isArray(f)&&f.length>0?f:DATOS_REALES.gastosFijos);
      if(Array.isArray(g))setGastosMes(g);
      // Restaurar ingresos guardados
      if(cfg&&typeof cfg==='object'&&!Array.isArray(cfg)){
        setIngresos({
          sole: cfg.ingreso_sole||'',
          gabi: cfg.ingreso_gabi||''
        });
      }
    } catch(e) {
      setCuotas(DATOS_REALES.cuotas); setPrestamos(DATOS_REALES.prestamos); setGastosFijos(DATOS_REALES.gastosFijos);
      setError('Sin conexión — mostrando datos locales');
    }
    setLoading(false);
  },[]);

  useEffect(()=>{load();},[load]);

  const save = async(body)=>{
    setSaving(true);
    try{ await api({},'POST',body); await load(); setModal(null); }
    catch(e){ alert('Error al guardar'); }
    setSaving(false);
  };

  const handlePagarCuota = async id=>{ setSaving(true); try{await api({action:'pagarCuota',id});await load();}catch(e){} setSaving(false); };
  const handlePagarPrestamo = async id=>{ setSaving(true); try{await api({action:'pagarPrestamo',id});await load();}catch(e){} setSaving(false); };
  const handleDelete = async(id,sheet)=>{ if(!confirm('¿Eliminár este registro?'))return; setSaving(true); try{await api({action:'deleteItem',id,sheet});await load();}catch(e){} setSaving(false); };
  const handleTogglePagoFijo = async(id, estabaPagado)=>{
    // Optimistic update inmediato
    setGastosFijos(prev=>prev.map(g=>g.id===id?{...g,pagado:estabaPagado?'NO':'SI'}:g));
    // Persistir en Sheet
    try { await api({action:'togglePagoFijo',id}); }
    catch(e){ /* revertir si falla */ setGastosFijos(prev=>prev.map(g=>g.id===id?{...g,pagado:estabaPagado?'SI':'NO'}:g)); }
  };

  // Guardar ingreso con debounce — espera 1.5s después del último cambio para no spamear el Sheet
  const ingresoTimers = React.useRef({});
  const handleSetIngreso = (key, value) => {
    setIngresos(prev=>({...prev,[key]:value}));
    clearTimeout(ingresoTimers.current[key]);
    ingresoTimers.current[key] = setTimeout(async()=>{
      try {
        await api({},'POST',{action:'setConfig', clave:`ingreso_${key}`, valor:parseFloat(value)||0});
      } catch(e){}
    }, 1500);
  };

  const cuotasActivas = cuotas.filter(c=>c.activa==='SI'&&parseInt(c.cuotas_pagadas)<parseInt(c.cuotas_totales));
  const cuotasTerminadas = cuotas.filter(c=>c.activa!=='SI'||parseInt(c.cuotas_pagadas)>=parseInt(c.cuotas_totales));

  const TABS = [
    {id:'dashboard',label:'Inicio',Icon:Ic.Home},
    {id:'cuotas',label:'Cuotas',Icon:Ic.Card},
    {id:'prestamos',label:'Préstamos',Icon:Ic.Loan},
    {id:'fijos',label:'Fijos',Icon:Ic.Fixed},
    {id:'variables',label:'Variables',Icon:Ic.Var},
  ];

  const modalForms = {
    cuota:{title:'+ Nueva cuota',Form:FormCuota},
    prestamo:{title:'+ Nuevo préstamo',Form:FormPrestamo},
    fijo:{title:'+ Gasto fijo',Form:FormGastoFijo},
    variable:{title:'+ Gasto variable',Form:FormGastoVar},
  };

  return (
    <div style={{minHeight:'100vh',paddingBottom:76}}>

      {/* Header */}
      <header style={{background:'var(--surface)',borderBottom:'1px solid var(--border)',padding:'12px 16px',position:'sticky',top:0,zIndex:30}}>
        <div style={{maxWidth:600,margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h1 style={{fontWeight:800,fontSize:17,letterSpacing:'-0.01em'}}>
            Gastos con Amor <span style={{fontSize:16}}>💜</span>
          </h1>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {(loading||saving)&&<Spinner size={15}/>}
            <span style={{fontSize:12,color:'var(--muted)',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:7,padding:'4px 10px',fontWeight:600}}>{mesActual()}</span>
          </div>
        </div>
      </header>

      {error&&<div style={{background:'rgba(244,63,94,0.1)',border:'1px solid rgba(244,63,94,0.25)',margin:'10px 16px',borderRadius:8,padding:'8px 12px',fontSize:12,color:'var(--red)'}}>{error}</div>}

      <main style={{maxWidth:600,margin:'0 auto',padding:'14px 14px'}}>
        {tab==='dashboard'&&<Dashboard cuotas={cuotas} prestamos={prestamos} gastosFijos={gastosFijos} gastosMes={gastosMes} ingresos={ingresos} onSetIngreso={handleSetIngreso}/>}

        {tab==='cuotas'&&(
          <TabCuotas
            cuotasActivas={cuotasActivas}
            cuotasTerminadas={cuotasTerminadas}
            onPagar={handlePagarCuota}
            onDelete={handleDelete}
            onAdd={()=>setModal('cuota')}
          />
        )}

        {tab==='prestamos'&&(
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <h2 style={{fontWeight:700,fontSize:15}}>Préstamos</h2>
              <button onClick={()=>setModal('prestamo')} style={{background:'var(--accent2)',border:'none',color:'white',borderRadius:9,padding:'6px 12px',cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:'inherit',display:'flex',alignItems:'center',gap:4}}><Ic.Plus/>Nuevo</button>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {prestamos.length===0&&<p style={{color:'var(--muted)',fontSize:13,textAlign:'center',padding:28}}>Sin préstamos</p>}
              {prestamos.map(p=><PrestamoCard key={p.id} item={p} onPagar={handlePagarPrestamo} onDelete={handleDelete}/>)}
            </div>
          </div>
        )}

        {tab==='fijos'&&<TabFijos gastosFijos={gastosFijos} onTogglePago={handleTogglePagoFijo} onDelete={handleDelete} onAdd={()=>setModal('fijo')} loading={loading} saving={saving}/>}

        {tab==='variables'&&<TabVariables gastosMes={gastosMes} onDelete={handleDelete} onAdd={()=>setModal('variable')}/>}
      </main>

      {/* Bottom Nav */}
      <nav style={{position:'fixed',bottom:0,left:0,right:0,background:'var(--surface)',borderTop:'1px solid var(--border)',display:'flex',zIndex:30}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2,padding:'9px 0',background:'none',border:'none',cursor:'pointer',color:tab===t.id?'var(--accent)':'var(--muted)',borderTop:`2px solid ${tab===t.id?'var(--accent)':'transparent'}`,transition:'color 0.2s',fontFamily:'inherit'}}>
            <t.Icon/><span style={{fontSize:9,fontWeight:tab===t.id?700:400}}>{t.label}</span>
          </button>
        ))}
      </nav>

      {/* Modals */}
      {modal==='cuota'&&<Modal title="+ Nueva cuota" onClose={()=>setModal(null)}><FormCuota onSubmit={save} loading={saving}/></Modal>}
      {modal==='prestamo'&&<Modal title="+ Nuevo préstamo" onClose={()=>setModal(null)}><FormPrestamo onSubmit={save} loading={saving}/></Modal>}
      {modal==='fijo'&&<Modal title="+ Gasto fijo" onClose={()=>setModal(null)}><FormGastoFijo onSubmit={save} loading={saving}/></Modal>}
      {modal==='variable'&&<Modal title="+ Gasto variable" onClose={()=>setModal(null)}><FormGastoVar onSubmit={save} loading={saving}/></Modal>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
