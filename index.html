<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3d2e4f">
<title>Gastos con Amor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ==================== RESET & BASE ==================== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'Manrope', -apple-system, system-ui, sans-serif;
    background: #f5f0e8;
    color: #1f1a2e;
    min-height: 100vh;
    line-height: 1.5;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
  }
  input, select, textarea, button { font-family: inherit; font-size: inherit; }
  button { cursor: pointer; border: none; background: none; }

  :root {
    --plum: #3d2e4f;
    --plum-light: #6b4d87;
    --rose: #d4859a;
    --rose-soft: #f4d8e0;
    --cream: #f5f0e8;
    --paper: #faf5ee;
    --ink: #1f1a2e;
    --muted: #8a8598;
    --line: #e5ddd0;
    --gold: #c9974d;
    --green: #5a8c6a;
    --green-bg: #d9ebe0;
    --yellow: #d4a748;
    --yellow-bg: #fbf0d0;
    --red: #b85959;
    --red-bg: #f3dada;
    --sole: #f4d8e0;
    --gabi: #d8e4f0;
    --comp: #e8dcef;
  }

  /* ==================== HEADER ==================== */
  header {
    background: var(--plum);
    color: var(--cream);
    padding: 1.25rem 1.25rem 1rem;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 3px solid var(--gold);
  }
  .brand {
    display: flex; align-items: baseline; gap: 0.5rem;
    font-family: 'Fraunces', serif;
  }
  .brand-heart { color: var(--rose); font-size: 1.5rem; line-height: 1; }
  .brand-title { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; font-style: italic; }
  .brand-sub { font-size: 0.75rem; opacity: 0.65; font-family: 'Manrope'; font-style: normal; letter-spacing: 0.15em; text-transform: uppercase; margin-left: auto; }

  .month-selector {
    display: flex; align-items: center; gap: 0.5rem; margin-top: 0.75rem;
    background: rgba(255,255,255,0.08); padding: 0.5rem 0.75rem; border-radius: 8px;
  }
  .month-selector label { font-size: 0.75rem; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.1em; }
  .month-selector input {
    background: transparent; border: none; color: var(--cream);
    font-size: 1rem; font-weight: 600; flex: 1; outline: none;
    font-family: 'Fraunces', serif;
  }
  .month-selector .pill {
    background: var(--gold); color: var(--plum); padding: 0.15rem 0.6rem;
    border-radius: 100px; font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.05em;
  }

  /* ==================== TABS ==================== */
  nav.tabs {
    display: flex; background: var(--paper);
    border-bottom: 1px solid var(--line);
    position: sticky; top: 112px; z-index: 99;
    overflow-x: auto; scrollbar-width: none;
  }
  nav.tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 1; min-width: fit-content;
    padding: 0.9rem 1rem;
    font-size: 0.85rem; font-weight: 600;
    color: var(--muted); white-space: nowrap;
    position: relative; transition: color 0.2s;
  }
  .tab.active { color: var(--plum); }
  .tab.active::after {
    content: ''; position: absolute; bottom: 0; left: 15%; right: 15%;
    height: 3px; background: var(--rose); border-radius: 3px 3px 0 0;
  }

  /* ==================== CONTENT ==================== */
  main { padding: 1rem 1rem 6rem; max-width: 900px; margin: 0 auto; }
  .view { display: none; animation: fadeIn 0.3s ease; }
  .view.active { display: block; }
  @keyframes fadeIn { from {opacity: 0; transform: translateY(8px);} to {opacity: 1; transform: none;} }

  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 1rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--plum); margin: 1.5rem 0 0.75rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .section-title::before {
    content: ''; display: block; width: 24px; height: 2px; background: var(--rose);
  }

  /* ==================== CARDS - TABLERO ==================== */
  .cards-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem;
  }
  .card {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 14px; padding: 0.9rem;
    position: relative; overflow: hidden;
  }
  .card.hero { grid-column: 1 / -1; padding: 1.2rem; background: linear-gradient(135deg, var(--plum), var(--plum-light)); color: var(--cream); }
  .card .label {
    font-size: 0.7rem; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .card.hero .label { color: rgba(255,255,255,0.7); }
  .card .value {
    font-family: 'Fraunces', serif;
    font-size: 1.7rem; font-weight: 700;
    margin-top: 0.25rem; line-height: 1.1;
    letter-spacing: -0.02em;
  }
  .card.hero .value { font-size: 2.4rem; }
  .card .sub {
    font-size: 0.75rem; color: var(--muted); margin-top: 0.35rem;
  }
  .card.hero .sub { color: rgba(255,255,255,0.6); }

  /* Cards titular */
  .card.titular-sole { background: var(--sole); border-color: #e8b8c8; }
  .card.titular-gabi { background: var(--gabi); border-color: #b8c8e0; }
  .card.titular-comp { background: var(--comp); border-color: #c8b8d8; }

  /* Balance con semaforo */
  .balance-row {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.75rem; border-radius: 10px;
    background: var(--paper); border: 1px solid var(--line);
    margin-top: 0.5rem;
  }
  .balance-row .dot {
    width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
  }
  .balance-row .dot.verde { background: var(--green); }
  .balance-row .dot.amarillo { background: var(--yellow); }
  .balance-row .dot.rojo { background: var(--red); }
  .balance-row .dot.sin { background: var(--muted); }
  .balance-row .name { flex: 1; font-weight: 600; }
  .balance-row .pct { font-weight: 700; font-family: 'Fraunces'; }
  .balance-row.verde { background: var(--green-bg); border-color: var(--green); }
  .balance-row.amarillo { background: var(--yellow-bg); border-color: var(--yellow); }
  .balance-row.rojo { background: var(--red-bg); border-color: var(--red); }

  /* ==================== TABLAS ==================== */
  .table-wrap {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 12px; overflow: hidden;
  }
  .table-row {
    display: grid; grid-template-columns: 1fr auto;
    padding: 0.8rem 0.9rem; border-bottom: 1px solid var(--line);
    gap: 0.5rem; align-items: center;
  }
  .table-row:last-child { border-bottom: none; }
  .table-row.clickable { cursor: pointer; transition: background 0.15s; }
  .table-row.clickable:active { background: var(--rose-soft); }
  .table-row .desc { font-weight: 600; font-size: 0.9rem; }
  .table-row .meta { font-size: 0.72rem; color: var(--muted); margin-top: 0.1rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .table-row .amt { font-family: 'Fraunces', serif; font-weight: 700; font-size: 1rem; text-align: right; }
  .badge {
    display: inline-block; padding: 0.1rem 0.45rem; border-radius: 100px;
    font-size: 0.68rem; font-weight: 600; letter-spacing: 0.02em;
    background: var(--line); color: var(--ink);
  }
  .badge.sole { background: var(--sole); }
  .badge.gabi { background: var(--gabi); }
  .badge.comp { background: var(--comp); }
  .badge.tag { background: var(--plum); color: var(--cream); }

  /* ==================== FORMULARIOS ==================== */
  .form-tabs {
    display: flex; gap: 0.4rem; margin-bottom: 1rem;
    overflow-x: auto; scrollbar-width: none; padding-bottom: 0.25rem;
  }
  .form-tabs::-webkit-scrollbar { display: none; }
  .form-tab {
    padding: 0.55rem 1rem; border-radius: 100px;
    background: var(--paper); border: 1px solid var(--line);
    font-weight: 600; font-size: 0.85rem; color: var(--muted);
    white-space: nowrap; transition: all 0.2s;
  }
  .form-tab.active {
    background: var(--plum); color: var(--cream); border-color: var(--plum);
  }
  .form { display: none; }
  .form.active { display: block; animation: fadeIn 0.25s; }
  .field { margin-bottom: 0.9rem; }
  .field label {
    display: block; font-size: 0.75rem; font-weight: 600;
    color: var(--plum); margin-bottom: 0.3rem;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .field input, .field select, .field textarea {
    width: 100%; padding: 0.7rem 0.85rem;
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 10px; color: var(--ink);
    font-size: 0.95rem; transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--plum);
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; }

  .btn {
    width: 100%; padding: 0.9rem;
    background: var(--plum); color: var(--cream);
    border-radius: 12px; font-weight: 700; font-size: 1rem;
    letter-spacing: 0.02em; transition: transform 0.1s;
  }
  .btn:active { transform: scale(0.98); }
  .btn.secondary { background: var(--paper); color: var(--plum); border: 1px solid var(--line); }
  .btn.danger { background: var(--red); }
  .btn-row { display: flex; gap: 0.5rem; margin-top: 0.5rem; }

  /* ==================== EMPTY / LOADING ==================== */
  .empty {
    text-align: center; padding: 2.5rem 1rem;
    color: var(--muted);
  }
  .empty-icon {
    font-size: 2.5rem; margin-bottom: 0.5rem; opacity: 0.4;
  }
  .loading {
    text-align: center; padding: 2rem;
    color: var(--muted); font-style: italic;
  }
  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid var(--line); border-top-color: var(--plum);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 0.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ==================== TOAST ==================== */
  #toast {
    position: fixed; bottom: 1.5rem; left: 50%;
    transform: translateX(-50%) translateY(150%);
    background: var(--plum); color: var(--cream);
    padding: 0.75rem 1.25rem; border-radius: 100px;
    font-weight: 600; font-size: 0.9rem;
    box-shadow: 0 8px 24px rgba(61,46,79,0.3);
    transition: transform 0.3s ease;
    z-index: 200; max-width: 90%;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.error { background: var(--red); }
  #toast.success { background: var(--green); }

  /* ==================== SETUP MODAL ==================== */
  .setup-modal {
    position: fixed; inset: 0; background: rgba(31,26,46,0.8);
    display: flex; align-items: center; justify-content: center;
    z-index: 300; padding: 1rem;
  }
  .setup-box {
    background: var(--paper); border-radius: 20px;
    padding: 1.75rem; max-width: 400px; width: 100%;
    border: 2px solid var(--plum);
  }
  .setup-box h2 { font-family: 'Fraunces', serif; color: var(--plum); margin-bottom: 0.5rem; }
  .setup-box p { color: var(--muted); font-size: 0.85rem; margin-bottom: 1rem; }

  /* ==================== LIST FILTER ==================== */
  .list-filter {
    display: flex; gap: 0.4rem; margin-bottom: 0.75rem;
    overflow-x: auto; scrollbar-width: none;
  }
  .list-filter::-webkit-scrollbar { display: none; }
  .list-filter button {
    padding: 0.4rem 0.85rem; border-radius: 100px;
    background: var(--paper); border: 1px solid var(--line);
    font-size: 0.8rem; font-weight: 600; color: var(--muted);
    white-space: nowrap;
  }
  .list-filter button.active {
    background: var(--rose); border-color: var(--rose); color: var(--plum);
  }

  /* ==================== DETAIL SHEET (bottom sheet) ==================== */
  .sheet-backdrop {
    position: fixed; inset: 0; background: rgba(31,26,46,0.5);
    z-index: 250; opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .sheet-backdrop.show { opacity: 1; pointer-events: auto; }
  .detail-sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--paper);
    border-radius: 24px 24px 0 0;
    padding: 1.25rem 1.25rem 2rem;
    max-height: 85vh; overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    z-index: 260;
  }
  .detail-sheet.show { transform: translateY(0); }
  .sheet-handle {
    width: 40px; height: 4px; background: var(--line);
    border-radius: 100px; margin: 0 auto 1rem;
  }
  .sheet-title {
    font-family: 'Fraunces', serif;
    font-size: 1.3rem; font-weight: 700; color: var(--plum);
    margin-bottom: 1rem;
  }
  .detail-row {
    display: flex; justify-content: space-between;
    padding: 0.6rem 0; border-bottom: 1px solid var(--line);
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-row .k { color: var(--muted); font-size: 0.85rem; }
  .detail-row .v { font-weight: 600; }

  @media (min-width: 600px) {
    main { padding: 1.5rem 2rem 6rem; }
    .cards-grid { grid-template-columns: repeat(3, 1fr); }
    .card.hero { grid-column: 1 / -1; }
  }
</style>
</head>
<body>

<!-- ==================== HEADER ==================== -->
<header>
  <div class="brand">
    <span class="brand-heart">❤</span>
    <span class="brand-title">Gastos con Amor</span>
    <span class="brand-sub">v4</span>
  </div>
  <div class="month-selector">
    <label>Mes</label>
    <input type="text" id="mesInput" placeholder="MM/AAAA" maxlength="7">
    <span class="pill" id="mesPill">ABR 26</span>
  </div>
</header>

<nav class="tabs" id="tabs">
  <button class="tab active" data-view="tablero">Tablero</button>
  <button class="tab" data-view="cargar">+ Cargar</button>
  <button class="tab" data-view="fijos">Fijos</button>
  <button class="tab" data-view="variables">Variables</button>
  <button class="tab" data-view="cuotas">Cuotas</button>
  <button class="tab" data-view="prestamos">Préstamos</button>
</nav>

<main>

<!-- ==================== VIEW: TABLERO ==================== -->
<section class="view active" id="view-tablero">
  <div id="tablero-content">
    <div class="loading"><span class="spinner"></span>Cargando datos…</div>
  </div>
</section>

<!-- ==================== VIEW: CARGAR ==================== -->
<section class="view" id="view-cargar">
  <div class="section-title">Nuevo movimiento</div>

  <div class="form-tabs" id="formTabs">
    <button class="form-tab active" data-form="variable">💳 Variable</button>
    <button class="form-tab" data-form="fijo">🏠 Fijo</button>
    <button class="form-tab" data-form="cuota">💸 Cuota</button>
    <button class="form-tab" data-form="prestamo">📋 Préstamo</button>
  </div>

  <!-- FORM: VARIABLE -->
  <form class="form active" id="form-variable">
    <div class="field">
      <label>MES del resumen</label>
      <input type="text" name="MES" placeholder="MM/AAAA" required>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Fecha</label>
        <input type="date" name="Fecha" required>
      </div>
      <div class="field">
        <label>Monto</label>
        <input type="number" name="Monto" step="0.01" required>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Titular</label>
        <select name="Titular" data-catalog="titulares" required></select>
      </div>
      <div class="field">
        <label>Tarjeta / Medio</label>
        <select name="Tarjeta" data-catalog="tarjetas" required></select>
      </div>
    </div>
    <div class="field">
      <label>Descripción</label>
      <input type="text" name="Descripción" required>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Categoría</label>
        <select name="Categoría" data-catalog="categoriasVariables" required></select>
      </div>
      <div class="field">
        <label>Cuotas (si aplica)</label>
        <input type="number" name="Cuotas" min="1" placeholder="1">
      </div>
    </div>
    <div class="field">
      <label>Notas</label>
      <textarea name="Notas" rows="2"></textarea>
    </div>
    <button type="submit" class="btn">Guardar variable</button>
  </form>

  <!-- FORM: FIJO -->
  <form class="form" id="form-fijo">
    <div class="field">
      <label>MES</label>
      <input type="text" name="MES" placeholder="MM/AAAA" required>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Titular</label>
        <select name="Titular" data-catalog="titulares" required></select>
      </div>
      <div class="field">
        <label>Categoría</label>
        <select name="Categoría" data-catalog="categoriasFijos" required></select>
      </div>
    </div>
    <div class="field">
      <label>Descripción</label>
      <input type="text" name="Descripción" required>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Día Venc.</label>
        <input type="number" name="DíaVencim" min="1" max="31">
      </div>
      <div class="field">
        <label>Monto</label>
        <input type="number" name="Monto" step="0.01" required>
      </div>
    </div>
    <div class="field">
      <label>Notas</label>
      <textarea name="Notas" rows="2"></textarea>
    </div>
    <button type="submit" class="btn">Guardar fijo</button>
  </form>

  <!-- FORM: CUOTA -->
  <form class="form" id="form-cuota">
    <div class="field-row">
      <div class="field">
        <label>Titular</label>
        <select name="Titular" data-catalog="titulares" required></select>
      </div>
      <div class="field">
        <label>Tarjeta</label>
        <select name="Tarjeta" data-catalog="tarjetas" required></select>
      </div>
    </div>
    <div class="field">
      <label>Descripción</label>
      <input type="text" name="Descripción" required>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Fecha compra</label>
        <input type="date" name="FechaCompra">
      </div>
      <div class="field">
        <label>Monto total</label>
        <input type="number" name="MontoTotal" step="0.01" required>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Cuotas totales</label>
        <input type="number" name="CuotasTotales" min="1" required>
      </div>
      <div class="field">
        <label>Cuotas pagadas</label>
        <input type="number" name="CuotasPagadas" min="0" value="0">
      </div>
    </div>
    <div class="field">
      <label>Mes primer resumen</label>
      <input type="text" name="MesPrimerResumen" placeholder="MM/AAAA" required>
    </div>
    <div class="field">
      <label>Notas</label>
      <textarea name="Notas" rows="2"></textarea>
    </div>
    <button type="submit" class="btn">Guardar cuota</button>
  </form>

  <!-- FORM: PRÉSTAMO -->
  <form class="form" id="form-prestamo">
    <div class="field-row">
      <div class="field">
        <label>Titular</label>
        <select name="Titular" data-catalog="titulares" required></select>
      </div>
      <div class="field">
        <label>Tipo</label>
        <select name="Tipo" data-catalog="tiposPrestamo" required></select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Nro/Ref.</label>
        <input type="text" name="Nro/Referencia">
      </div>
      <div class="field">
        <label>Fecha otorg.</label>
        <input type="date" name="FechaOtorgamiento">
      </div>
    </div>
    <div class="field">
      <label>Descripción</label>
      <input type="text" name="Descripción">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Monto total</label>
        <input type="number" name="MontoTotal" step="0.01">
      </div>
      <div class="field">
        <label>Monto x cuota</label>
        <input type="number" name="MontoXCuota" step="0.01" required>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Cuotas totales</label>
        <input type="number" name="CuotasTotales" min="1" required>
      </div>
      <div class="field">
        <label>Cuotas pagadas</label>
        <input type="number" name="CuotasPagadas" min="0" value="0">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Día venc.</label>
        <input type="number" name="DíaVencim" min="1" max="31">
      </div>
      <div class="field">
        <label>Primer mes pago</label>
        <input type="text" name="PrimerMesPago" placeholder="MM/AAAA" required>
      </div>
    </div>
    <button type="submit" class="btn">Guardar préstamo</button>
  </form>
</section>

<!-- ==================== VIEWS: LISTADOS ==================== -->
<section class="view" id="view-fijos">
  <div class="section-title">Gastos fijos del mes</div>
  <div id="list-fijos"><div class="loading"><span class="spinner"></span>Cargando…</div></div>
</section>

<section class="view" id="view-variables">
  <div class="section-title">Gastos variables del mes</div>
  <div id="list-variables"><div class="loading"><span class="spinner"></span>Cargando…</div></div>
</section>

<section class="view" id="view-cuotas">
  <div class="section-title">Cuotas activas</div>
  <div class="list-filter">
    <button class="active" data-cuotas-filter="mes">Del mes</button>
    <button data-cuotas-filter="todas">Todas activas</button>
  </div>
  <div id="list-cuotas"><div class="loading"><span class="spinner"></span>Cargando…</div></div>
</section>

<section class="view" id="view-prestamos">
  <div class="section-title">Préstamos y adelantos</div>
  <div id="list-prestamos"><div class="loading"><span class="spinner"></span>Cargando…</div></div>
</section>

</main>

<!-- ==================== BOTTOM SHEET (detalle) ==================== -->
<div class="sheet-backdrop" id="sheetBackdrop"></div>
<div class="detail-sheet" id="detailSheet">
  <div class="sheet-handle"></div>
  <div id="sheetContent"></div>
</div>

<!-- ==================== TOAST ==================== -->
<div id="toast"></div>

<!-- ==================== SETUP MODAL ==================== -->
<div class="setup-modal" id="setupModal" style="display:none;">
  <div class="setup-box">
    <h2>Configuración inicial</h2>
    <p>Ingresá el endpoint y el token del API para conectar con tu Google Sheet.</p>
    <div class="field">
      <label>URL Endpoint</label>
      <input type="text" id="setupEndpoint" placeholder="https://script.google.com/...">
    </div>
    <div class="field">
      <label>Token</label>
      <input type="text" id="setupToken" placeholder="uuid...">
    </div>
    <button class="btn" onclick="saveSetup()">Guardar y conectar</button>
  </div>
</div>

<script>
/* ==================== CONFIG & ESTADO ==================== */
const LS_ENDPOINT = 'gca_endpoint';
const LS_TOKEN = 'gca_token';
const LS_MES = 'gca_mes';

// Endpoint por defecto (del usuario)
const DEFAULT_ENDPOINT = 'https://script.google.com/macros/s/AKfycbyyPrYpSW-UkPZsQUUbmPjdS6utYJg229pZS42LT2UmUUH1TE1gesWWNVSqTlgtpdtcKw/exec';
const DEFAULT_TOKEN = 'cd29e168-89b8-46dc-91dc-28cb36e395e3';

const state = {
  endpoint: localStorage.getItem(LS_ENDPOINT) || DEFAULT_ENDPOINT,
  token: localStorage.getItem(LS_TOKEN) || DEFAULT_TOKEN,
  mes: localStorage.getItem(LS_MES) || defaultMes(),
  catalogos: null,
  dashboardCache: null
};

function defaultMes() {
  const d = new Date();
  return String(d.getMonth() + 1).padStart(2, '0') + '/' + d.getFullYear();
}

/* ==================== API CLIENT ==================== */
async function api(action, params = {}) {
  if (!state.endpoint || !state.token) {
    showSetup();
    throw new Error('Falta configurar endpoint/token');
  }
  const url = new URL(state.endpoint);
  url.searchParams.set('action', action);
  url.searchParams.set('token', state.token);
  for (const [k, v] of Object.entries(params)) {
    if (v !== undefined && v !== null) url.searchParams.set(k, v);
  }
  const ctrl = new AbortController();
  const timeout = setTimeout(() => ctrl.abort(), 20000);
  try {
    const res = await fetch(url.toString(), { method: 'GET', redirect: 'follow', signal: ctrl.signal });
    clearTimeout(timeout);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Error desconocido');
    return json.data;
  } catch (err) {
    clearTimeout(timeout);
    if (err.name === 'AbortError') throw new Error('Timeout (20s)');
    throw err;
  }
}

async function apiPost(action, data) {
  const url = new URL(state.endpoint);
  url.searchParams.set('action', action);
  url.searchParams.set('token', state.token);
  url.searchParams.set('data', JSON.stringify(data));
  const res = await fetch(url.toString(), { method: 'GET', redirect: 'follow' });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || 'Error desconocido');
  return json.data;
}

/* ==================== TOAST ==================== */
function toast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = type, 2500);
}

/* ==================== FORMAT HELPERS ==================== */
const ARS = n => {
  const num = Number(n) || 0;
  return '$' + num.toLocaleString('es-AR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
};
const mesPillText = (mes) => {
  const meses = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
  const p = mes.split('/');
  if (p.length !== 2) return mes;
  return meses[parseInt(p[0],10)-1] + ' ' + p[1].slice(2);
};
const titularBadge = (t) => {
  const cls = t === 'Soledad' ? 'sole' : t === 'Gabriel' ? 'gabi' : 'comp';
  return `<span class="badge ${cls}">${t}</span>`;
};

/* ==================== NAVEGACIÓN ==================== */
document.querySelectorAll('#tabs .tab').forEach(t => {
  t.addEventListener('click', () => switchView(t.dataset.view));
});
function switchView(name) {
  document.querySelectorAll('#tabs .tab').forEach(t => t.classList.toggle('active', t.dataset.view === name));
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === 'view-' + name));
  // Cargar datos al entrar
  if (name === 'tablero') renderTablero();
  if (name === 'fijos') renderListFijos();
  if (name === 'variables') renderListVariables();
  if (name === 'cuotas') renderListCuotas('mes');
  if (name === 'prestamos') renderListPrestamos();
}

document.querySelectorAll('#formTabs .form-tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('#formTabs .form-tab').forEach(x => x.classList.toggle('active', x === t));
    document.querySelectorAll('#view-cargar .form').forEach(f => f.classList.toggle('active', f.id === 'form-' + t.dataset.form));
  });
});

/* ==================== MES SELECTOR ==================== */
const mesInput = document.getElementById('mesInput');
mesInput.value = state.mes;
document.getElementById('mesPill').textContent = mesPillText(state.mes);

mesInput.addEventListener('change', () => {
  const v = mesInput.value.trim();
  if (!/^\d{2}\/\d{4}$/.test(v)) {
    toast('Formato MM/AAAA', 'error');
    mesInput.value = state.mes;
    return;
  }
  state.mes = v;
  localStorage.setItem(LS_MES, v);
  document.getElementById('mesPill').textContent = mesPillText(v);
  // Refrescar vista actual
  const active = document.querySelector('#tabs .tab.active').dataset.view;
  switchView(active);
});

/* ==================== CATÁLOGOS (para forms) ==================== */
async function cargarCatalogos() {
  if (state.catalogos) return state.catalogos;
  try {
    state.catalogos = await api('getCatalogos');
    // Poblar selects
    document.querySelectorAll('select[data-catalog]').forEach(sel => {
      const key = sel.dataset.catalog;
      const items = state.catalogos[key] || [];
      sel.innerHTML = '<option value="">—</option>' + items.map(i => `<option>${i}</option>`).join('');
    });
    return state.catalogos;
  } catch (err) {
    toast('Error cargando catálogos: ' + err.message, 'error');
  }
}

/* ==================== TABLERO ==================== */
async function renderTablero() {
  const cont = document.getElementById('tablero-content');
  cont.innerHTML = '<div class="loading"><span class="spinner"></span>Cargando…</div>';
  try {
    const data = await api('getDashboard', { mes: state.mes });
    state.dashboardCache = data;
    cont.innerHTML = `
      <div class="cards-grid">
        <div class="card hero">
          <div class="label">Total del hogar — ${mesPillText(state.mes)}</div>
          <div class="value">${ARS(data.totalGeneral)}</div>
          <div class="sub">${data.conteos.fijos} fijos · ${data.conteos.cuotas} cuotas · ${data.conteos.variables} variables · ${data.conteos.prestamos} préstamos</div>
        </div>
        ${cardTitular('Soledad', data.porTitular.Soledad, 'titular-sole')}
        ${cardTitular('Gabriel', data.porTitular.Gabriel, 'titular-gabi')}
        ${cardTitular('Compartido', data.porTitular.Compartido, 'titular-comp')}
      </div>

      <div class="section-title">Balance vs ingresos</div>
      ${balanceRow('Soledad', data.balance.Soledad)}
      ${balanceRow('Gabriel', data.balance.Gabriel)}

      <div class="section-title">Por tarjeta</div>
      <div class="table-wrap">
        ${data.porTarjeta.map(t => `
          <div class="table-row">
            <div>
              <div class="desc">${t.tarjeta}</div>
              <div class="meta">${ARS(t.cuotas)} cuotas · ${ARS(t.variables)} variables</div>
            </div>
            <div class="amt">${ARS(t.total)}</div>
          </div>
        `).join('')}
      </div>

      <div class="section-title">Desglose del mes</div>
      <div class="table-wrap">
        ${rowTipo('Gastos fijos', data.porTitular.Soledad.fijos + data.porTitular.Gabriel.fijos + data.porTitular.Compartido.fijos, data.conteos.fijos)}
        ${rowTipo('Cuotas activas', data.porTitular.Soledad.cuotas + data.porTitular.Gabriel.cuotas + data.porTitular.Compartido.cuotas, data.conteos.cuotas)}
        ${rowTipo('Gastos variables', data.porTitular.Soledad.variables + data.porTitular.Gabriel.variables + data.porTitular.Compartido.variables, data.conteos.variables)}
        ${rowTipo('Préstamos', data.porTitular.Soledad.prestamos + data.porTitular.Gabriel.prestamos + data.porTitular.Compartido.prestamos, data.conteos.prestamos)}
      </div>
    `;
  } catch (err) {
    cont.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div>${err.message}<br><button class="btn secondary" onclick="renderTablero()" style="margin-top:1rem;max-width:200px;">Reintentar</button></div>`;
  }
}

function cardTitular(nombre, d, cls) {
  return `
    <div class="card ${cls}">
      <div class="label">${nombre}</div>
      <div class="value">${ARS(d.total)}</div>
      <div class="sub">F ${ARS(d.fijos)} · C ${ARS(d.cuotas)} · V ${ARS(d.variables)}</div>
    </div>`;
}

function balanceRow(nombre, b) {
  const estado = b.estado || 'sin_ingreso';
  const cls = estado === 'sin_ingreso' ? '' : estado;
  const dotCls = estado === 'sin_ingreso' ? 'sin' : estado;
  const pctText = b.pctConsumido !== null && b.pctConsumido !== undefined
    ? (b.pctConsumido * 100).toFixed(0) + '%'
    : '—';
  return `
    <div class="balance-row ${cls}">
      <span class="dot ${dotCls}"></span>
      <div class="name">${nombre} <span style="font-weight:400;color:var(--muted);font-size:0.8rem;">${ARS(b.gasto)} / ${ARS(b.ingreso)}</span></div>
      <div class="pct">${pctText}</div>
    </div>`;
}

function rowTipo(label, monto, count) {
  return `
    <div class="table-row">
      <div>
        <div class="desc">${label}</div>
        <div class="meta">${count} movimiento${count !== 1 ? 's' : ''}</div>
      </div>
      <div class="amt">${ARS(monto)}</div>
    </div>`;
}

/* ==================== LISTADOS ==================== */
async function renderListFijos() {
  const cont = document.getElementById('list-fijos');
  cont.innerHTML = '<div class="loading"><span class="spinner"></span>Cargando…</div>';
  try {
    const items = await api('listFijos', { mes: state.mes });
    if (!items.length) { cont.innerHTML = empty('Sin fijos cargados en este mes'); return; }
    cont.innerHTML = '<div class="table-wrap">' + items.map(i => rowItem(i, 'fijo')).join('') + '</div>';
  } catch (err) {
    cont.innerHTML = `<div class="empty">⚠ ${err.message}</div>`;
  }
}

async function renderListVariables() {
  const cont = document.getElementById('list-variables');
  cont.innerHTML = '<div class="loading"><span class="spinner"></span>Cargando…</div>';
  try {
    const items = await api('listGastosMes', { mes: state.mes });
    if (!items.length) { cont.innerHTML = empty('Sin variables cargados en este mes'); return; }
    cont.innerHTML = '<div class="table-wrap">' + items.map(i => rowItem(i, 'variable')).join('') + '</div>';
  } catch (err) {
    cont.innerHTML = `<div class="empty">⚠ ${err.message}</div>`;
  }
}

async function renderListCuotas(filtro = 'mes') {
  const cont = document.getElementById('list-cuotas');
  cont.innerHTML = '<div class="loading"><span class="spinner"></span>Cargando…</div>';
  document.querySelectorAll('[data-cuotas-filter]').forEach(b => b.classList.toggle('active', b.dataset.cuotasFilter === filtro));
  try {
    const params = filtro === 'mes' ? { mes: state.mes, soloActivas: 'true' } : { soloActivas: 'true' };
    const items = await api('listCuotas', params);
    if (!items.length) { cont.innerHTML = empty('Sin cuotas activas'); return; }
    cont.innerHTML = '<div class="table-wrap">' + items.map(i => rowItem(i, 'cuota')).join('') + '</div>';
  } catch (err) {
    cont.innerHTML = `<div class="empty">⚠ ${err.message}</div>`;
  }
}

document.querySelectorAll('[data-cuotas-filter]').forEach(b => {
  b.addEventListener('click', () => renderListCuotas(b.dataset.cuotasFilter));
});

async function renderListPrestamos() {
  const cont = document.getElementById('list-prestamos');
  cont.innerHTML = '<div class="loading"><span class="spinner"></span>Cargando…</div>';
  try {
    const items = await api('listPrestamos');
    if (!items.length) { cont.innerHTML = empty('Sin préstamos cargados'); return; }
    cont.innerHTML = '<div class="table-wrap">' + items.map(i => rowItem(i, 'prestamo')).join('') + '</div>';
  } catch (err) {
    cont.innerHTML = `<div class="empty">⚠ ${err.message}</div>`;
  }
}

function empty(msg) {
  return `<div class="empty"><div class="empty-icon">🌸</div>${msg}</div>`;
}

function rowItem(item, tipo) {
  let desc = item['Descripción'] || '(sin desc)';
  let monto = 0;
  let meta = [];
  if (tipo === 'fijo') {
    monto = item.Monto;
    meta = [item['Categoría'], item.MES, item.Pagado ? '✓ Pagado' : 'Pendiente'];
  } else if (tipo === 'variable') {
    monto = item.Monto;
    meta = [item['Categoría'], item.Tarjeta, item.Fecha];
  } else if (tipo === 'cuota') {
    monto = item.MontoXCuota;
    meta = [item.Tarjeta, `${item.CuotasPagadas}/${item.CuotasTotales} cuotas`, 'Desde ' + item.MesPrimerResumen];
  } else if (tipo === 'prestamo') {
    monto = item.MontoXCuota;
    meta = [item.Tipo, `${item.CuotasPagadas}/${item.CuotasTotales}`, 'Día ' + (item['DíaVencim'] || '?'), item.Estado];
  }
  const idEscaped = JSON.stringify(item.ID);
  return `
    <div class="table-row clickable" onclick='openDetail(${idEscaped}, "${tipo}")'>
      <div>
        <div class="desc">${desc}</div>
        <div class="meta">${titularBadge(item.Titular)} ${meta.filter(m => m !== '' && m !== undefined).map(m => `<span>${m}</span>`).join(' · ')}</div>
      </div>
      <div class="amt">${ARS(monto)}</div>
    </div>`;
}

/* ==================== BOTTOM SHEET (detalle) ==================== */
function openDetail(id, tipo) {
  const mapList = {
    fijo: 'listFijos', variable: 'listGastosMes', cuota: 'listCuotas', prestamo: 'listPrestamos'
  };
  const mapDelete = {
    fijo: 'deleteFijo', variable: 'deleteGastoMes', cuota: 'deleteCuota', prestamo: 'deletePrestamo'
  };
  // Cargar el item desde cache de la lista (busqueda simple: re-llamamos al list)
  const params = tipo === 'cuota' ? { soloActivas: 'false' } : {};
  if (tipo === 'fijo' || tipo === 'variable') params.mes = state.mes;
  api(mapList[tipo], params).then(items => {
    const item = items.find(x => x.ID === id);
    if (!item) { toast('No encontrado', 'error'); return; }
    showSheet(item, tipo, mapDelete[tipo]);
  }).catch(err => toast(err.message, 'error'));
}

function showSheet(item, tipo, deleteAction) {
  const content = document.getElementById('sheetContent');
  const rows = Object.entries(item).map(([k, v]) => {
    if (k === 'AAAAMM' || k === '' || v === '' || v === null) return '';
    let val = v;
    if (typeof v === 'number' && /monto/i.test(k)) val = ARS(v);
    if (typeof v === 'boolean') val = v ? '✓ Sí' : '✗ No';
    return `<div class="detail-row"><span class="k">${k}</span><span class="v">${val}</span></div>`;
  }).join('');

  content.innerHTML = `
    <div class="sheet-title">${item['Descripción'] || item['Nro/Referencia'] || 'Detalle'}</div>
    ${rows}
    <div class="btn-row" style="margin-top:1rem;">
      <button class="btn danger" onclick="deleteItem('${item.ID}', '${deleteAction}')">🗑 Eliminar</button>
      <button class="btn secondary" onclick="closeSheet()">Cerrar</button>
    </div>
  `;
  document.getElementById('sheetBackdrop').classList.add('show');
  document.getElementById('detailSheet').classList.add('show');
}
function closeSheet() {
  document.getElementById('sheetBackdrop').classList.remove('show');
  document.getElementById('detailSheet').classList.remove('show');
}
document.getElementById('sheetBackdrop').addEventListener('click', closeSheet);

async function deleteItem(id, action) {
  if (!confirm('¿Eliminar este registro? No se puede deshacer.')) return;
  try {
    await api(action, { id: id });
    toast('Eliminado', 'success');
    closeSheet();
    // Refrescar vista actual
    const active = document.querySelector('#tabs .tab.active').dataset.view;
    switchView(active);
  } catch (err) {
    toast(err.message, 'error');
  }
}

/* ==================== FORM SUBMIT ==================== */
const formActions = {
  'form-variable': 'addGastoMes',
  'form-fijo': 'addFijo',
  'form-cuota': 'addCuota',
  'form-prestamo': 'addPrestamo'
};

Object.keys(formActions).forEach(formId => {
  document.getElementById(formId).addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const btn = form.querySelector('.btn');
    const origText = btn.textContent;
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Guardando…';
    const data = {};
    new FormData(form).forEach((v, k) => { if (v !== '') data[k] = v; });
    try {
      await apiPost(formActions[formId], data);
      toast('Guardado ✓', 'success');
      form.reset();
      // Refrescar tablero en cache
      state.dashboardCache = null;
    } catch (err) {
      toast(err.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = origText;
    }
  });
});

/* ==================== SETUP MODAL ==================== */
function showSetup() {
  document.getElementById('setupModal').style.display = 'flex';
  document.getElementById('setupEndpoint').value = state.endpoint || '';
  document.getElementById('setupToken').value = state.token || '';
}
function saveSetup() {
  const ep = document.getElementById('setupEndpoint').value.trim();
  const tk = document.getElementById('setupToken').value.trim();
  if (!ep || !tk) { toast('Completá los dos campos', 'error'); return; }
  localStorage.setItem(LS_ENDPOINT, ep);
  localStorage.setItem(LS_TOKEN, tk);
  state.endpoint = ep; state.token = tk;
  document.getElementById('setupModal').style.display = 'none';
  init();
}

/* ==================== INIT ==================== */
async function init() {
  await cargarCatalogos();
  renderTablero();

  // Prellenar MES por defecto en forms
  document.querySelectorAll('input[name="MES"]').forEach(i => i.value = state.mes);
}

init();
</script>
</body>
</html>
