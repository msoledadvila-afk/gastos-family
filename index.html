<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0D1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Gastos con Amor 💰</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ─────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:       #0D1117;
  --bg2:      #161B22;
  --card:     #1C2128;
  --border:   #2D333B;
  --accent:   #E94560;
  --sole:     #4A90D9;
  --gabi:     #9B59B6;
  --comp:     #F39C12;
  --green:    #27AE60;
  --yellow:   #F39C12;
  --red:      #E74C3C;
  --white:    #FFFFFF;
  --muted:    #8B949E;
  --sole-bg:  #0A2040;
  --gabi-bg:  #220A3A;
  --comp-bg:  #2A1800;
  --green-bg: #0A2A14;
  --red-bg:   #2A0A10;
  --font:     'DM Sans', sans-serif;
  --mono:     'DM Mono', monospace;
  --radius:   12px;
  --nav-h:    64px;
  --header-h: 56px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--white);font-family:var(--font)}

/* ── Layout ────────────────────────────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;position:relative}
#header{
  height:var(--header-h);padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg2);border-bottom:1px solid var(--border);
  position:relative;z-index:10;flex-shrink:0;
}
#header h1{font-size:17px;font-weight:700;letter-spacing:-0.3px}
#header h1 span{color:var(--accent)}
.titular-badge{
  display:flex;align-items:center;gap:6px;padding:6px 12px;
  border-radius:20px;border:1px solid var(--border);cursor:pointer;
  background:var(--card);font-size:12px;font-weight:600;transition:.2s;
}
.titular-badge:active{opacity:.7}
.titular-badge .dot{width:8px;height:8px;border-radius:50%}
.dot-sole{background:var(--sole)}
.dot-gabi{background:var(--gabi)}

#main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + 8px)}
#main::-webkit-scrollbar{display:none}

/* ── Bottom Nav ────────────────────────────────────────────────────────────── */
#nav{
  height:var(--nav-h);background:var(--bg2);border-top:1px solid var(--border);
  display:flex;align-items:stretch;flex-shrink:0;position:relative;z-index:10;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;background:none;border:none;color:var(--muted);cursor:pointer;
  font-family:var(--font);font-size:10px;font-weight:500;padding:4px 0;
  transition:color .15s;position:relative;
}
.nav-btn.active{color:var(--white)}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:30%;right:30%;height:2px;background:var(--accent);border-radius:2px 2px 0 0}
.nav-btn svg{width:20px;height:20px}
.nav-btn.add-btn{
  color:var(--white);
}
.nav-btn.add-btn .nav-icon{
  width:42px;height:42px;background:var(--accent);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(233,69,96,.4);
  transition:transform .15s,box-shadow .15s;
}
.nav-btn.add-btn:active .nav-icon{transform:scale(.92);box-shadow:0 2px 8px rgba(233,69,96,.3)}

/* ── Tabs ──────────────────────────────────────────────────────────────────── */
.tab{display:none;padding:0 0 16px}
.tab.active{display:block}

/* ── Section headers ───────────────────────────────────────────────────────── */
.section-hdr{
  padding:20px 16px 8px;display:flex;align-items:center;justify-content:space-between;
}
.section-hdr h2{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.section-hdr span{font-size:12px;color:var(--muted);font-family:var(--mono)}

/* ── Cards ─────────────────────────────────────────────────────────────────── */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.card-pad{padding:14px 16px}

/* ── Tablero ────────────────────────────────────────────────────────────────── */
#tab-tablero{padding-top:8px}

.mes-selector{
  margin:12px 16px 0;display:flex;align-items:center;
  gap:8px;padding:10px 14px;background:var(--card);
  border-radius:var(--radius);border:1px solid var(--border);
}
.mes-selector select{
  flex:1;background:none;border:none;color:var(--yellow);
  font-family:var(--mono);font-size:14px;font-weight:500;
  cursor:pointer;outline:none;-webkit-appearance:none;
}
.mes-selector select option{background:var(--card);color:var(--white)}
.mes-selector label{font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap}

/* Semáforo */
.semaforo{
  margin:12px 16px 0;padding:14px 16px;
  background:var(--card);border-radius:var(--radius);border:1px solid var(--border);
}
.semaforo-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.semaforo-row:last-child{margin-bottom:0}
.semaforo-row span{font-size:11px;color:var(--muted);font-weight:500}
.semaforo-bars{display:flex;gap:8px;flex:1;margin:0 12px}
.semaforo-bar{flex:1}
.semaforo-bar label{display:block;font-size:9px;font-weight:600;margin-bottom:3px;text-align:center}
.semaforo-bar label.sole{color:var(--sole)}
.semaforo-bar label.gabi{color:var(--gabi)}
.progress-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .5s ease}
.semaforo-emoji{font-size:20px;min-width:26px;text-align:center}

/* Tabla resumen */
.resumen-tabla{margin:12px 16px 0}
.resumen-tabla table{width:100%;border-collapse:collapse}
.resumen-tabla th{
  padding:7px 8px;font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.4px;color:var(--muted);background:var(--card);
  border-bottom:1px solid var(--border);
}
.resumen-tabla th:first-child{text-align:left}
.resumen-tabla th.sole{color:var(--sole)}
.resumen-tabla th.gabi{color:var(--gabi)}
.resumen-tabla th.comp{color:var(--comp)}
.resumen-tabla td{
  padding:8px 8px;font-size:12px;font-weight:500;
  border-bottom:1px solid rgba(45,51,59,.5);
  font-family:var(--mono);text-align:right;
}
.resumen-tabla td:first-child{text-align:left;font-family:var(--font);font-size:12px;color:var(--muted)}
.resumen-tabla td.sole{color:var(--sole)}
.resumen-tabla td.gabi{color:var(--gabi)}
.resumen-tabla td.comp{color:var(--comp)}
.resumen-tabla td.total-num{color:var(--white);font-weight:600}
.resumen-tabla tr.hdr-row td{font-weight:700;font-size:11px;color:var(--muted);background:rgba(255,255,255,.03);padding:10px 8px 6px}
.resumen-tabla tr.subtotal td{background:var(--card);border-top:1px solid var(--border);font-weight:700}
.resumen-tabla tr.total-egresos td{background:rgba(233,69,96,.12);border-top:1px solid var(--accent);font-weight:700;font-size:13px}
.resumen-tabla tr.total-egresos td:first-child{color:var(--accent)}
.resumen-tabla tr.balance td{background:rgba(39,174,96,.1);font-weight:700;font-size:13px}
.resumen-tabla tr.balance td:first-child{color:var(--green)}
.resumen-tabla tr.balance td.pos{color:var(--green)}
.resumen-tabla tr.balance td.neg{color:var(--red)}

/* Proyección */
.proj-card{margin:4px 16px 0;overflow-x:auto}
.proj-card table{width:100%;border-collapse:collapse;min-width:300px}
.proj-card th{padding:7px 8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);background:var(--card);border-bottom:1px solid var(--border)}
.proj-card th:first-child{text-align:left}
.proj-card td{padding:8px 8px;font-size:11px;border-bottom:1px solid rgba(45,51,59,.5);font-family:var(--mono);text-align:right}
.proj-card td:first-child{text-align:left;font-family:var(--font);font-size:11px}
.proj-card tr.proj-total td{background:var(--card);border-top:1px solid var(--border);font-weight:700;color:var(--yellow)}
.proj-card tr.proj-total td:first-child{color:var(--yellow)}

/* ── Fijos ──────────────────────────────────────────────────────────────────── */
.fijo-item{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;
}
.fijo-item:active{background:rgba(255,255,255,.03)}
.fijo-item:last-child{border-bottom:none}
.fijo-check{
  width:24px;height:24px;border-radius:6px;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:13px;
  flex-shrink:0;transition:.2s;
}
.fijo-check.paid{background:var(--green);border-color:var(--green)}
.fijo-info{flex:1;min-width:0}
.fijo-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fijo-meta{font-size:10px;color:var(--muted);margin-top:1px}
.fijo-meta.paid{color:var(--green)}
.fijo-meta.pending{color:var(--yellow)}
.fijo-amount{font-family:var(--mono);font-size:13px;font-weight:500;text-align:right;flex-shrink:0}
.fijo-amount .cat-badge{display:block;font-size:9px;color:var(--muted);text-align:right;margin-top:2px;font-family:var(--font)}

/* Titular pill en fijos */
.tit-pill{
  display:inline-block;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:.3px;margin-right:5px;
}
.tit-pill.sole{background:var(--sole-bg);color:var(--sole)}
.tit-pill.gabi{background:var(--gabi-bg);color:var(--gabi)}
.tit-pill.comp{background:var(--comp-bg);color:var(--comp)}

/* ── Formulario nuevo gasto ─────────────────────────────────────────────────── */
#tab-nuevo{padding:12px 16px}
.form-section{margin-bottom:16px}
.form-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px;display:block}

/* Selector titular */
.tit-selector{display:flex;gap:8px}
.tit-btn{
  flex:1;padding:10px 8px;border-radius:10px;border:2px solid var(--border);
  background:none;color:var(--muted);cursor:pointer;font-family:var(--font);
  font-size:12px;font-weight:600;transition:.15s;
}
.tit-btn.active[data-tit="Soledad"]{border-color:var(--sole);background:var(--sole-bg);color:var(--sole)}
.tit-btn.active[data-tit="Gabriel"]{border-color:var(--gabi);background:var(--gabi-bg);color:var(--gabi)}
.tit-btn.active[data-tit="Compartido"]{border-color:var(--comp);background:var(--comp-bg);color:var(--comp)}

/* Selector tarjeta */
.tarjeta-selector{display:flex;flex-wrap:wrap;gap:6px}
.tar-btn{
  padding:7px 12px;border-radius:8px;border:1px solid var(--border);
  background:none;color:var(--muted);cursor:pointer;font-family:var(--font);
  font-size:11px;font-weight:500;transition:.15s;
}
.tar-btn.active{border-color:var(--sole);background:rgba(74,144,217,.12);color:var(--sole)}

/* Display monto */
.monto-display{
  text-align:center;padding:20px 0 8px;
  font-family:var(--mono);font-size:42px;font-weight:500;letter-spacing:-1px;
  color:var(--white);
}
.monto-display .currency{font-size:20px;color:var(--muted);margin-right:4px;font-weight:400}

/* Numpad */
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.num-btn{
  padding:16px 0;border-radius:10px;background:var(--card);border:1px solid var(--border);
  color:var(--white);font-size:18px;font-weight:500;cursor:pointer;font-family:var(--mono);
  transition:background .1s,transform .1s;
}
.num-btn:active{background:var(--border);transform:scale(.96)}
.num-btn.zero{grid-column:1/3}
.num-btn.del{background:rgba(233,69,96,.1);border-color:rgba(233,69,96,.3);color:var(--accent)}
.num-btn.comma{font-size:22px}

/* Inputs */
.input-field{
  width:100%;padding:11px 14px;background:var(--card);border:1px solid var(--border);
  border-radius:10px;color:var(--white);font-family:var(--font);font-size:14px;
  outline:none;transition:border-color .15s;
}
.input-field:focus{border-color:var(--accent)}
.input-field::placeholder{color:var(--muted)}
.input-field option{background:var(--card)}

/* Cuotas */
.cuotas-row{display:flex;align-items:center;gap:12px}
.cuotas-row input[type=range]{
  flex:1;-webkit-appearance:none;height:4px;border-radius:2px;
  background:var(--border);outline:none;
}
.cuotas-row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  background:var(--accent);cursor:pointer;
}
.cuotas-val{
  min-width:40px;text-align:center;font-family:var(--mono);font-size:16px;
  font-weight:600;color:var(--white);
}
.cuota-info{
  font-size:11px;color:var(--muted);text-align:center;padding:4px 0;
  font-family:var(--mono);
}
.cuota-info.en-cuotas{color:var(--yellow)}

/* Submit */
.submit-btn{
  width:100%;padding:15px;border-radius:12px;background:var(--accent);
  border:none;color:var(--white);font-family:var(--font);font-size:15px;
  font-weight:700;cursor:pointer;letter-spacing:.3px;
  transition:opacity .15s,transform .1s;
}
.submit-btn:active{opacity:.85;transform:scale(.99)}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}
.submit-btn.loading::after{content:' ···'}

/* ── Cuotas activas ─────────────────────────────────────────────────────────── */
.cuota-card{
  margin:8px 16px 0;padding:14px 16px;
  background:var(--card);border-radius:var(--radius);border:1px solid var(--border);
}
.cuota-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cuota-desc{font-size:13px;font-weight:600;line-height:1.3}
.cuota-tarjeta{font-size:10px;color:var(--muted);margin-top:2px}
.cuota-badge{
  padding:3px 8px;border-radius:8px;font-size:10px;font-weight:700;
  font-family:var(--mono);flex-shrink:0;margin-left:8px;
}
.cuota-badge.activa{background:rgba(39,174,96,.15);color:var(--green)}
.cuota-badge.ultima{background:rgba(233,69,96,.15);color:var(--accent)}
.cuota-badge.pagada{background:rgba(45,51,59,.5);color:var(--muted)}
.cuota-progress-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.cuota-progress-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.cuota-progress-fill{height:100%;border-radius:2px;background:var(--green);transition:width .4s}
.cuota-progress-fill.sole{background:var(--sole)}
.cuota-progress-fill.gabi{background:var(--gabi)}
.cuota-progress-fill.comp{background:var(--comp)}
.cuota-nums{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-family:var(--mono)}
.cuota-nums span{color:var(--white);font-weight:600}

/* ── Préstamos ──────────────────────────────────────────────────────────────── */
.prestamo-card{
  margin:8px 16px 0;padding:14px 16px;
  background:var(--card);border-radius:var(--radius);border:1px solid var(--border);
}
.prestamo-top{display:flex;justify-content:space-between;align-items:flex-start}
.prestamo-desc{font-size:14px;font-weight:600}
.prestamo-tipo{font-size:10px;color:var(--muted);margin-top:2px}
.prestamo-monto{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);text-align:right}
.prestamo-monto small{display:block;font-size:9px;color:var(--muted);font-weight:400}
.prestamo-mid{display:flex;gap:16px;margin:10px 0;padding:10px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.prestamo-stat{flex:1;text-align:center}
.prestamo-stat .val{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--white)}
.prestamo-stat .lbl{font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.prestamo-next{font-size:11px;color:var(--muted);text-align:right}

/* ── Modal ──────────────────────────────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;
  width:100%;max-width:480px;border:1px solid var(--border);border-bottom:none;
  transform:translateY(20px);transition:transform .2s;
}
.modal-overlay.open .modal{transform:translateY(0)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:4px}
.modal p{font-size:12px;color:var(--muted);margin-bottom:16px}
.modal-btns{display:flex;gap:8px}
.modal-btn{
  flex:1;padding:12px;border-radius:10px;border:none;cursor:pointer;
  font-family:var(--font);font-size:13px;font-weight:600;transition:.15s;
}
.modal-btn.cancel{background:var(--card);color:var(--muted)}
.modal-btn.confirm{background:var(--accent);color:var(--white)}
.modal-btn:active{opacity:.8}

/* ── Toast ──────────────────────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:calc(var(--nav-h) + 12px);left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--card);border:1px solid var(--border);
  padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;
  opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;
  white-space:nowrap;z-index:200;max-width:320px;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:var(--green);color:var(--green)}
#toast.err{border-color:var(--red);color:var(--red)}
#toast.warn{border-color:var(--yellow);color:var(--yellow)}

/* ── Loading ────────────────────────────────────────────────────────────────── */
.skeleton{
  background:linear-gradient(90deg,var(--card) 25%,var(--border) 50%,var(--card) 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;
  border-radius:6px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.loading-block{height:14px;margin-bottom:8px}
.loading-block.tall{height:60px}
.loading-block.w60{width:60%}
.loading-block.w80{width:80%}

.empty{padding:40px 16px;text-align:center;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty p{font-size:13px;line-height:1.5}

/* ── Scrollable list dentro de card ─────────────────────────────────────────── */
.list-card{margin:8px 16px 0;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div id="header">
    <h1>Gastos con <span>Amor</span> 💰</h1>
    <div class="titular-badge" onclick="toggleTitular()">
      <div class="dot" id="tit-dot"></div>
      <span id="tit-name">Cargando…</span>
    </div>
  </div>

  <!-- Main content -->
  <div id="main">

    <!-- ─── TAB: TABLERO ──────────────────────────────────────────────────── -->
    <div id="tab-tablero" class="tab active">
      <!-- Selector de mes -->
      <div class="mes-selector">
        <label>Mes</label>
        <select id="mes-sel" onchange="onMesChange()">
          <option value="04/2026">Abril 2026</option>
          <option value="05/2026">Mayo 2026</option>
          <option value="06/2026">Junio 2026</option>
          <option value="07/2026">Julio 2026</option>
          <option value="08/2026">Agosto 2026</option>
          <option value="09/2026">Septiembre 2026</option>
          <option value="10/2026">Octubre 2026</option>
          <option value="11/2026">Noviembre 2026</option>
          <option value="12/2026">Diciembre 2026</option>
        </select>
        <span style="color:var(--muted);font-size:16px">▾</span>
      </div>

      <!-- Semáforo -->
      <div class="semaforo" id="semaforo-box">
        <div class="loading-block skeleton w80"></div>
        <div class="loading-block skeleton w60"></div>
      </div>

      <!-- Tabla resumen -->
      <div class="section-hdr"><h2>Resumen del mes</h2></div>
      <div class="resumen-tabla list-card" id="resumen-tabla"></div>

      <!-- Proyección cuotas -->
      <div class="section-hdr"><h2>Proyección cuotas · 3 meses</h2></div>
      <div class="proj-card list-card" id="proj-tabla"></div>
    </div>

    <!-- ─── TAB: FIJOS ────────────────────────────────────────────────────── -->

<script>
// ══════════════════════════════════════════════════════════════════════════════
// CONFIGURACIÓN
// ══════════════════════════════════════════════════════════════════════════════
const EP = "https://script.google.com/macros/s/AKfycbwIZRuTnZYZIqm1GNnZuQx8LQWDuR-N7ZFiSJrTOy6pKjHp8INY90k7dUDLv5SfMgLKAg/exec";
const TIMEOUT_MS = 15000;

const MESES_LABEL = {
  "04/2026":"Abril 2026","05/2026":"Mayo 2026","06/2026":"Junio 2026",
  "07/2026":"Julio 2026","08/2026":"Agosto 2026","09/2026":"Septiembre 2026",
  "10/2026":"Octubre 2026","11/2026":"Noviembre 2026","12/2026":"Diciembre 2026",
};

// ══════════════════════════════════════════════════════════════════════════════
// ESTADO
// ══════════════════════════════════════════════════════════════════════════════
let titular = localStorage.getItem("gca_titular") || "Soledad";
let mesActivo = localStorage.getItem("gca_mes") || "04/2026";
let montoStr = "0";
let cuotasVal = 1;
let tarjetaVal = "VISA BNA";
let titFormVal = "Soledad";
let modalFijoId = null;
let cacheTablero = null;

// ══════════════════════════════════════════════════════════════════════════════
// API
// ══════════════════════════════════════════════════════════════════════════════
async function api(params) {
  const url = EP + "?" + new URLSearchParams(params).toString();
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), TIMEOUT_MS);
  try {
    const res = await fetch(url, { redirect: "follow", signal: ctrl.signal });
    clearTimeout(tid);
    return await res.json();
  } catch(e) {
    clearTimeout(tid);
    throw e;
  }
}

async function apiPost(data) {
  // Apps Script maneja mejor GET que POST — enviamos todo via GET con ?data=JSON
  const { action, ...rest } = data;
  const params = {
    action,
    data: encodeURIComponent(JSON.stringify(rest))
  };
  return api(params);
}

// ══════════════════════════════════════════════════════════════════════════════
// FORMATEO
// ══════════════════════════════════════════════════════════════════════════════
function $ (n) {
  if (n == null || n === "" || isNaN(Number(n))) return "—";
  const v = Number(n);
  if (v === 0) return "$ 0";
  return "$ " + Math.abs(v).toLocaleString("es-AR", { maximumFractionDigits: 0 });
}
function pct(n) {
  if (n == null || isNaN(Number(n))) return "—";
  return (Number(n) * 100).toFixed(1) + "%";
}
function semColor(p) {
  if (p == null) return "var(--muted)";
  const v = Number(p);
  if (v < 0.7) return "var(--green)";
  if (v < 0.9) return "var(--yellow)";
  return "var(--red)";
}
function semEmoji(p) {
  if (p == null) return "⚪";
  const v = Number(p);
  if (v < 0.7) return "🟢";
  if (v < 0.9) return "🟡";
  return "🔴";
}

// ══════════════════════════════════════════════════════════════════════════════
// TITULAR (header badge)
// ══════════════════════════════════════════════════════════════════════════════
function renderTitular() {
  document.getElementById("tit-name").textContent = titular;
  const dot = document.getElementById("tit-dot");
  dot.className = "dot " + (titular === "Soledad" ? "dot-sole" : "dot-gabi");
}
function toggleTitular() {
  titular = titular === "Soledad" ? "Gabriel" : "Soledad";
  localStorage.setItem("gca_titular", titular);
  renderTitular();
  // Sincronizar con el form de nuevo gasto
  document.querySelectorAll(".tit-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.tit === titular);
  });
  titFormVal = titular;
}

// ══════════════════════════════════════════════════════════════════════════════
// NAVEGACIÓN
// ══════════════════════════════════════════════════════════════════════════════
function goTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-" + tab).classList.add("active");
  document.getElementById("nav-" + tab).classList.add("active");
  if (tab === "tablero" && !cacheTablero) loadTablero();
  if (tab === "fijos") loadFijos();
  if (tab === "cuotas") loadCuotas();
  if (tab === "prest") loadPrestamos();
  document.getElementById("main").scrollTop = 0;
}

// ══════════════════════════════════════════════════════════════════════════════
// TAB: TABLERO
// ══════════════════════════════════════════════════════════════════════════════
function onMesChange() {
  mesActivo = document.getElementById("mes-sel").value;
  localStorage.setItem("gca_mes", mesActivo);
  cacheTablero = null;
  loadTablero();
}

async function loadTablero() {
  // Loading state
  document.getElementById("semaforo-box").innerHTML =
    '<div class="loading-block skeleton w80"></div><div class="loading-block skeleton w60"></div>';
  document.getElementById("resumen-tabla").innerHTML =
    '<div class="loading-block skeleton tall" style="margin:12px 16px"></div>';
  document.getElementById("proj-tabla").innerHTML =
    '<div class="loading-block skeleton tall" style="margin:12px 16px"></div>';

  try {
    const d = await api({ action: "getTablero", mes: mesActivo });
    if (!d.ok) throw new Error(d.error || "Error");
    cacheTablero = d;
    renderTablero(d);
  } catch(e) {
    document.getElementById("semaforo-box").innerHTML =
      '<p style="padding:12px;color:var(--muted);font-size:12px">Error al cargar. Tocá para reintentar.</p>';
    document.getElementById("semaforo-box").onclick = loadTablero;
  }
}

function renderTablero(d) {
  const s = d.resumen || {};

  // ── Semáforo ───────────────────────────────────────────────────────────────
  const pctSole = s.ingreso_sole > 0 ? s.total_egresos_sole / s.ingreso_sole : null;
  const pctGabi = s.ingreso_gabi > 0 ? s.total_egresos_gabi / s.ingreso_gabi : null;
  document.getElementById("semaforo-box").innerHTML = `
    <div class="semaforo-row">
      <span>% gastado</span>
      <div class="semaforo-bars">
        <div class="semaforo-bar">
          <label class="sole">Sole</label>
          <div class="progress-track">
            <div class="progress-fill" style="width:${Math.min((pctSole||0)*100,100)}%;background:${semColor(pctSole)}"></div>
          </div>
        </div>
        <div class="semaforo-bar">
          <label class="gabi">Gabi</label>
          <div class="progress-track">
            <div class="progress-fill" style="width:${Math.min((pctGabi||0)*100,100)}%;background:${semColor(pctGabi)}"></div>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:4px">
        <span class="semaforo-emoji">${semEmoji(pctSole)}</span>
        <span class="semaforo-emoji">${semEmoji(pctGabi)}</span>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);padding-top:4px">
      <span>Sole: <b style="color:${semColor(pctSole)}">${pct(pctSole)}</b> del ingreso</span>
      <span>Gabi: <b style="color:${semColor(pctGabi)}">${pct(pctGabi)}</b> del ingreso</span>
    </div>`;

  // ── Tabla resumen ─────────────────────────────────────────────────────────
  const tbl = document.getElementById("resumen-tabla");
  tbl.innerHTML = `<table>
    <thead>
      <tr>
        <th></th>
        <th class="sole">Soledad</th>
        <th class="gabi">Gabriel</th>
        <th class="comp">Comp.</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>💵 Ingresos</td>
        <td class="sole">${$(s.ingreso_sole)}</td>
        <td class="gabi">${$(s.ingreso_gabi)}</td>
        <td class="comp">—</td>
        <td class="total-num">${$(s.ingreso_sole + s.ingreso_gabi)}</td>
      </tr>
      <tr class="hdr-row"><td colspan="5">Gastos fijos</td></tr>
      <tr>
        <td>Tarjetas crédito</td>
        <td class="sole">${$(s.fijos_tarjeta_sole)}</td>
        <td class="gabi">${$(s.fijos_tarjeta_gabi)}</td>
        <td class="comp">${$(s.fijos_tarjeta_comp)}</td>
        <td class="total-num">${$(s.fijos_tarjeta_total)}</td>
      </tr>
      <tr>
        <td>Préstamos</td>
        <td class="sole">${$(s.fijos_prestamo_sole)}</td>
        <td class="gabi">${$(s.fijos_prestamo_gabi)}</td>
        <td class="comp">${$(s.fijos_prestamo_comp)}</td>
        <td class="total-num">${$(s.fijos_prestamo_total)}</td>
      </tr>
      <tr>
        <td>Servicios</td>
        <td class="sole">${$(s.fijos_servicios_sole)}</td>
        <td class="gabi">${$(s.fijos_servicios_gabi)}</td>
        <td class="comp">${$(s.fijos_servicios_comp)}</td>
        <td class="total-num">${$(s.fijos_servicios_total)}</td>
      </tr>
      <tr>
        <td>Suscripciones</td>
        <td class="sole">${$(s.fijos_suscripcion_sole)}</td>
        <td class="gabi">${$(s.fijos_suscripcion_gabi)}</td>
        <td class="comp">${$(s.fijos_suscripcion_comp)}</td>
        <td class="total-num">${$(s.fijos_suscripcion_total)}</td>
      </tr>
      <tr class="subtotal">
        <td>↳ Subtotal fijos</td>
        <td class="sole">${$(s.subtotal_fijos_sole)}</td>
        <td class="gabi">${$(s.subtotal_fijos_gabi)}</td>
        <td class="comp">${$(s.subtotal_fijos_comp)}</td>
        <td class="total-num">${$(s.subtotal_fijos_total)}</td>
      </tr>
      <tr class="hdr-row"><td colspan="5">Gastos variables</td></tr>
      <tr class="subtotal">
        <td>↳ Subtotal variables</td>
        <td class="sole">${$(s.subtotal_var_sole)}</td>
        <td class="gabi">${$(s.subtotal_var_gabi)}</td>
        <td class="comp">${$(s.subtotal_var_comp)}</td>
        <td class="total-num">${$(s.subtotal_var_total)}</td>
      </tr>
      <tr class="total-egresos">
        <td>TOTAL EGRESOS</td>
        <td class="sole">${$(s.total_egresos_sole)}</td>
        <td class="gabi">${$(s.total_egresos_gabi)}</td>
        <td class="comp">${$(s.total_egresos_comp)}</td>
        <td class="total-num">${$(s.total_egresos_total)}</td>
      </tr>
      <tr class="balance">
        <td>BALANCE</td>
        <td class="${s.balance_sole >= 0 ? 'pos' : 'neg'}">${$(s.balance_sole)}</td>
        <td class="${s.balance_gabi >= 0 ? 'pos' : 'neg'}">${$(s.balance_gabi)}</td>
        <td class="neg">${$(s.balance_comp)}</td>
        <td class="${s.balance_total >= 0 ? 'pos' : 'neg'}">${$(s.balance_total)}</td>
      </tr>
    </tbody>
  </table>`;

  // ── Proyección cuotas ─────────────────────────────────────────────────────
  const proj = d.proyeccion || [];
  const mesesLbl = [d.mes0 || "M0", d.mes1 || "M1", d.mes2 || "M2"];
  const pjTbl = document.getElementById("proj-tabla");
  if (!proj.length) {
    pjTbl.innerHTML = '<div class="empty"><p>Sin cuotas proyectadas</p></div>';
    return;
  }
  let rows = proj.map(p => `
    <tr>
      <td style="color:${p.titular==='Soledad'?'var(--sole)':p.titular==='Gabriel'?'var(--gabi)':'var(--comp)'}">${p.tarjeta}<br><small style="color:var(--muted);font-size:9px">${p.titular}</small></td>
      <td>${$(p.m0)}</td>
      <td>${$(p.m1)}</td>
      <td>${$(p.m2)}</td>
      <td>${$(p.total)}</td>
    </tr>`).join("");
  // Totales
  const tot = proj.reduce((a,p) => {
    a.m0 += (p.m0||0); a.m1 += (p.m1||0); a.m2 += (p.m2||0); a.total += (p.total||0);
    return a;
  }, {m0:0,m1:0,m2:0,total:0});
  pjTbl.innerHTML = `<table>
    <thead>
      <tr>
        <th style="text-align:left">Tarjeta</th>
        <th>${mesesLbl[0]}</th><th>${mesesLbl[1]}</th><th>${mesesLbl[2]}</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody>
      ${rows}
      <tr class="proj-total">
        <td>TOTAL</td>
        <td>${$(tot.m0)}</td><td>${$(tot.m1)}</td><td>${$(tot.m2)}</td>
        <td>${$(tot.total)}</td>
      </tr>
    </tbody>
  </table>`;
}

// ══════════════════════════════════════════════════════════════════════════════
// TAB: FIJOS

async function loadFijos() {
  document.getElementById("fijos-list").innerHTML =
    '<div class="loading-block skeleton tall" style="margin:16px"></div>';
  try {
    const d = await api({ action: "getFijos", mes: mesActivo });
    if (!d.ok) throw new Error(d.error);
    renderFijos(d.fijos || []);
  } catch(e) {
    document.getElementById("fijos-list").innerHTML =
      '<div class="empty"><p>Error al cargar fijos</p></div>';
  }
}

function renderFijos(fijos) {
  if (!fijos.length) {
    document.getElementById("fijos-list").innerHTML =
      '<div class="empty"><div class="empty-icon">📋</div><p>No hay gastos fijos para este mes</p></div>';
    return;
  }
  let total = 0;
  const html = fijos.map(f => {
    total += Number(f.monto) || 0;
    const tc = f.titular === "Soledad" ? "sole" : f.titular === "Gabriel" ? "gabi" : "comp";
    const paid = f.pagado === true || f.pagado === "TRUE" || f.pagado === true;
    return `<div class="fijo-item" data-id="${f.id}" data-desc="${(f.descripcion||'').replace(/"/g,'&quot;')}" data-monto="${f.monto}" onclick="fijoClick(this)">
      <div class="fijo-check ${paid ? 'paid' : ''}">${paid ? '✓' : ''}</div>
      <div class="fijo-info">
        <div class="fijo-name">${f.descripcion}</div>
        <div class="fijo-meta ${paid ? 'paid' : f.monto > 0 ? 'pending' : ''}">
          <span class="tit-pill ${tc}">${f.titular}</span>
          ${paid ? `✅ Pagado${f.fecha_pago ? ' · ' + f.fecha_pago : ''}` :
            f.monto > 0 ? '⏳ Pendiente' : '📝 Sin monto'}
        </div>
      </div>
      <div class="fijo-amount">
        ${f.monto > 0 ? $(f.monto) : '<span style="color:var(--muted)">—</span>'}
        <span class="cat-badge">${f.categoria || ''}</span>
      </div>
    </div>`;
  }).join("");
  document.getElementById("fijos-list").innerHTML = html;
  document.getElementById("fijos-total").textContent = $(total);
}

function fijoClick(el) {
  const id    = el.dataset.id;
  const desc  = el.dataset.desc;
  const monto = Number(el.dataset.monto) || 0;
  if (!monto) {
    toast("Sin monto registrado — actualizá en el Sheet", "warn"); return;
  }
  modalFijoId = id;
  document.getElementById("modal-titulo").textContent = "Marcar como pagado";
  document.getElementById("modal-desc").textContent = `${desc} · ${$(monto)}`;
  document.getElementById("modal-pagado").classList.add("open");
}
function closeModal() {
  document.getElementById("modal-pagado").classList.remove("open");
  modalFijoId = null;
}
async function confirmarPago() {
  closeModal();
  try {
    const d = await apiPost({ action: "marcarFijoPagado", id: modalFijoId, titular });
    if (d.ok) { toast("Pagado ✓", "ok"); loadFijos(); }
    else toast(d.error || "Error", "err");
  } catch(e) { toast("Error de conexión", "err"); }
}

// ══════════════════════════════════════════════════════════════════════════════
// TAB: NUEVO GASTO
// ══════════════════════════════════════════════════════════════════════════════
function setTitForm(t, btn) {
  titFormVal = t;
  document.querySelectorAll(".tit-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  // Mostrar/ocultar VISA PAT Gabriel
  const tarBtn = document.querySelector('[data-tar="VISA PATAGONIA GABRIEL"]');
  if (tarBtn) tarBtn.style.display = t === "Gabriel" ? "" : "none";
  // Si no es crédito ocultar cuotas
  const esCred = !["Débito","Efectivo","Transferencia"].includes(tarjetaVal);
  document.getElementById("cuotas-section").style.display = esCred ? "" : "none";
}
function setTarjeta(tar, btn) {
  tarjetaVal = tar;
  document.querySelectorAll(".tar-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  const esCred = !["Débito","Efectivo","Transferencia"].includes(tar);
  document.getElementById("cuotas-section").style.display = esCred ? "" : "none";
}
function numPress(n) {
  if (montoStr === "0") montoStr = n;
  else if (montoStr.length < 10) montoStr += n;
  updMonto();
}
function numDel() {
  montoStr = montoStr.length > 1 ? montoStr.slice(0,-1) : "0";
  updMonto();
}
function updMonto() {
  document.getElementById("monto-display").textContent =
    Number(montoStr).toLocaleString("es-AR");
  updCuotaInfo();
}
function updCuotas(v) {
  cuotasVal = Number(v);
  document.getElementById("cuotas-val").textContent = v;
  updCuotaInfo();
}
function updCuotaInfo() {
  const monto = Number(montoStr) || 0;
  const el = document.getElementById("cuota-info");
  if (cuotasVal === 1) {
    el.textContent = "1 pago → va a gastos del mes";
    el.className = "cuota-info";
  } else {
    const xc = monto > 0 ? ` · ${$(monto / cuotasVal)}/cuota` : "";
    el.textContent = `${cuotasVal} cuotas${xc} → va a cuotas activas`;
    el.className = "cuota-info en-cuotas";
  }
}

async function registrar() {
  const monto = Number(montoStr);
  const cat = document.getElementById("categoria").value;
  const desc = document.getElementById("descripcion").value.trim();
  if (monto <= 0) { toast("Ingresá un monto", "warn"); return; }
  if (!cat) { toast("Elegí una categoría", "warn"); return; }
  if (!desc) { toast("Agregá una descripción", "warn"); return; }

  const btn = document.getElementById("submit-btn");
  btn.disabled = true; btn.classList.add("loading");

  const hoy = new Date();
  const fecha = [
    String(hoy.getDate()).padStart(2,"0"),
    String(hoy.getMonth()+1).padStart(2,"0"),
    hoy.getFullYear()
  ].join("/");

  const payload = {
    action: cuotasVal > 1 ? "registrarCuota" : "registrarGasto",
    titular: titFormVal,
    tarjeta: tarjetaVal,
    descripcion: desc,
    categoria: cat,
    monto,
    cuotas: cuotasVal,
    fecha,
    mes: mesActivo,
  };

  try {
    const d = await apiPost(payload);
    if (d.ok) {
      toast(cuotasVal > 1
        ? `✓ ${cuotasVal} cuotas de ${$(monto/cuotasVal)} registradas`
        : `✓ ${$(monto)} registrado`, "ok");
      resetForm();
      cacheTablero = null;
      // Si está en tablero, recargar
      if (document.getElementById("tab-tablero").classList.contains("active")) loadTablero();
    } else {
      toast(d.error || "Error al guardar", "err");
    }
  } catch(e) {
    toast("Error de conexión", "err");
  } finally {
    btn.disabled = false; btn.classList.remove("loading");
    btn.textContent = "Registrar gasto →";
  }
}

function resetForm() {
  montoStr = "0";
  document.getElementById("monto-display").textContent = "0";
  document.getElementById("descripcion").value = "";
  document.getElementById("categoria").value = "";
  document.getElementById("cuotas-range").value = 1;
  cuotasVal = 1;
  document.getElementById("cuotas-val").textContent = "1";
  document.getElementById("cuota-info").textContent = "1 pago → va a gastos del mes";
  document.getElementById("cuota-info").className = "cuota-info";
}

// ══════════════════════════════════════════════════════════════════════════════
// TAB: CUOTAS
// ══════════════════════════════════════════════════════════════════════════════
async function loadCuotas() {
  document.getElementById("cuotas-list").innerHTML =
    '<div class="loading-block skeleton tall" style="margin:8px 16px"></div>';
  try {
    const d = await api({ action: "getCuotas" });
    if (!d.ok) throw new Error(d.error);
    renderCuotas(d.cuotas || []);
  } catch(e) {
    document.getElementById("cuotas-list").innerHTML =
      '<div class="empty"><p>Error al cargar cuotas</p></div>';
  }
}
function renderCuotas(cuotas) {
  if (!cuotas.length) {
    document.getElementById("cuotas-list").innerHTML =
      '<div class="empty"><div class="empty-icon">💳</div><p>No hay cuotas activas</p></div>';
    return;
  }
  let deudaTotal = 0;
  const html = cuotas.filter(c => c.estado !== "PAGADA").map(c => {
    const tc = c.titular === "Soledad" ? "sole" : c.titular === "Gabriel" ? "gabi" : "comp";
    const pct = c.cuotas_totales > 0 ? c.cuotas_pagadas / c.cuotas_totales : 0;
    const rest = c.cuotas_totales - c.cuotas_pagadas;
    deudaTotal += Number(c.deuda_restante) || 0;
    const badgeClass = rest === 1 ? "ultima" : "activa";
    const badgeText = rest === 1 ? "última cuota" : `${rest} rest.`;
    return `<div class="cuota-card">
      <div class="cuota-card-top">
        <div>
          <div class="cuota-desc">${c.descripcion}</div>
          <div class="cuota-tarjeta">
            <span class="tit-pill ${tc}">${c.titular}</span>
            ${c.tarjeta}
          </div>
        </div>
        <span class="cuota-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="cuota-progress-row">
        <div class="cuota-progress-track">
          <div class="cuota-progress-fill ${tc}" style="width:${Math.round(pct*100)}%"></div>
        </div>
        <span style="font-size:9px;color:var(--muted);font-family:var(--mono);white-space:nowrap">${c.cuotas_pagadas}/${c.cuotas_totales}</span>
      </div>
      <div class="cuota-nums">
        <span>${$(c.monto_x_cuota)}<span style="color:var(--muted)">/cuota</span></span>
        <span>Deuda: <span>${$(c.deuda_restante)}</span></span>
      </div>
    </div>`;
  }).join("");
  document.getElementById("cuotas-list").innerHTML = html || '<div class="empty"><p>Sin cuotas pendientes</p></div>';
  document.getElementById("cuotas-deuda").textContent = $(deudaTotal);
}

// ══════════════════════════════════════════════════════════════════════════════
// TAB: PRÉSTAMOS
// ══════════════════════════════════════════════════════════════════════════════
async function loadPrestamos() {
  document.getElementById("prest-list").innerHTML =
    '<div class="loading-block skeleton tall" style="margin:8px 16px"></div>';
  try {
    const d = await api({ action: "getPrestamos" });
    if (!d.ok) throw new Error(d.error);
    renderPrestamos(d.prestamos || []);
  } catch(e) {
    document.getElementById("prest-list").innerHTML =
      '<div class="empty"><p>Error al cargar préstamos</p></div>';
  }
}
function renderPrestamos(prest) {
  if (!prest.length) {
    document.getElementById("prest-list").innerHTML =
      '<div class="empty"><div class="empty-icon">💲</div><p>Sin préstamos activos</p></div>';
    return;
  }
  const html = prest.map(p => {
    const pct = p.cuotas_totales > 0 ? p.cuotas_pagadas / p.cuotas_totales : 0;
    return `<div class="prestamo-card">
      <div class="prestamo-top">
        <div>
          <div class="prestamo-desc">${p.descripcion}</div>
          <div class="prestamo-tipo">${p.tipo} · ${p.titular}</div>
        </div>
        <div class="prestamo-monto">
          ${$(p.monto_x_cuota)}
          <small>por cuota</small>
        </div>
      </div>
      <div class="prestamo-mid">
        <div class="prestamo-stat">
          <div class="val">${p.cuotas_pagadas}/${p.cuotas_totales}</div>
          <div class="lbl">Cuotas</div>
        </div>
        <div class="prestamo-stat">
          <div class="val" style="color:var(--accent)">${$(p.deuda_restante)}</div>
          <div class="lbl">Deuda rest.</div>
        </div>
        <div class="prestamo-stat">
          <div class="val">${Math.round(pct*100)}%</div>
          <div class="lbl">Cancelado</div>
        </div>
      </div>
      <div class="prestamo-next">Próx. vencimiento: <b>${p.proximo_vencimiento || '—'}</b></div>
    </div>`;
  }).join("");
  document.getElementById("prest-list").innerHTML = html;
}

// ══════════════════════════════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════════════════════════════
let _tt;
function toast(msg, type = "ok") {
  const el = document.getElementById("toast");
  el.textContent = msg; el.className = "toast show " + type;
  clearTimeout(_tt);
  _tt = setTimeout(() => { el.className = "toast"; }, 3200);
}

// ══════════════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════════════
document.addEventListener("DOMContentLoaded", () => {
  renderTitular();

  // Sincronizar selector de mes con valor guardado
  const sel = document.getElementById("mes-sel");
  if (sel) sel.value = mesActivo;

  // Sincronizar titular en form de nuevo gasto
  document.querySelectorAll(".tit-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.tit === titular);
  });
  titFormVal = titular;

  // Ocultar tarjeta Gabriel si no es Gabriel
  const tarGabi = document.querySelector('[data-tar="VISA PATAGONIA GABRIEL"]');
  if (tarGabi) {
    tarGabi.style.display = titular === "Gabriel" ? "" : "none";
  }

  loadTablero();
});
</script>
</body>
</html>
