<!DOCTYPE html>

<head>

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3d;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --accent: #7c6af7;
      --accent2: #f97316;
      --green: #22d3a0;
      --red: #f43f5e;
      --yellow: #fbbf24;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Bricolage Grotesque', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .mono { font-family: 'DM Mono', monospace; }
    .bg-noise {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.7s linear infinite; }

    /* Slide up */
    @keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .slide-up { animation: slideUp 0.3s ease forwards; }

    /* Progress bar */
    .progress-track { background: var(--surface2); border-radius: 99px; overflow: hidden; height: 6px; }
    .progress-bar { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Tab active */
    .tab-active { color: var(--accent); border-bottom: 2px solid var(--accent); }

    /* Input/select */
    input, select, textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 14px;
      width: 100%;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
    }
    input::placeholder { color: var(--muted); }
    select option { background: var(--surface2); }

    /* Button */
    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 11px 20px;
      font-family: inherit;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      width: 100%;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'DM Mono', monospace;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }

    /* Glow effect for important numbers */
    .glow-red { text-shadow: 0 0 20px rgba(244,63,94,0.4); }
    .glow-green { text-shadow: 0 0 20px rgba(34,211,160,0.4); }
  </style>
</head>

// ---- API ----
async function api(params, method = 'GET', body = null) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 15000);
  try {
    let url = EP + '?' + new URLSearchParams(params).toString();
    const opts = { method, signal: controller.signal, redirect: 'follow' };
    if (method === 'POST' && body) {
      opts.headers = { 'Content-Type': 'application/x-www-form-urlencoded' };
      opts.body = new URLSearchParams({ data: JSON.stringify(body) }).toString();
    }
    const res = await fetch(url, opts);
    return await res.json();
  } finally {
    clearTimeout(timeout);
  }
}

// ===========================================================
// COMPONENT: Spinner

const Spinner = ({ size = 18 }) => (

  </svg>

// ===========================================================
// COMPONENT: Progress Ring
// ===========================================================
const ProgressRing = ({ pagadas, totales, size = 56 }) => {
  const pct = totales > 0 ? pagadas / totales : 0;
  const r = (size - 8) / 2;
  const circ = 2 * Math.PI * r;
  const dash = circ * (1 - pct);
  const color = pct >= 1 ? 'var(--green)' : pct >= 0.6 ? 'var(--yellow)' : 'var(--accent)';
  return (
    <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--surface2)" strokeWidth="4"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="4"
          strokeDasharray={circ} strokeDashoffset={dash} strokeLinecap="round"
          style={{ transition: 'stroke-dashoffset 0.6s ease' }}/>
      </svg>
      <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
        <span className="mono" style={{ fontSize: 11, fontWeight:500, color }}>{pagadas}/{totales}</span>
      </div>
    </div>
  );
};

};

const Modal = ({ title, onClose, children }) => (
  <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.7)', zIndex:50, display:'flex', alignItems:'flex-end', justifyContent:'center', padding: '0 0 0 0' }}

// COMPONENT: FormCuota
// ===========================================================
const FormCuota = ({ onSubmit, loading }) => {
  const [f, setF] = useState({
    descripcion: '', tarjeta: 'VISA BNA', monto_cuota: '',
    cuotas_totales: '12', cuotas_pagadas: '0',
    fecha_primera_cuota: today(), categoria: 'Hogar'
  });
  const handleSubmit = (e) => { e.preventDefault(); onSubmit({ action: 'addCuota', ...f, monto_cuota: parseFloat(f.monto_cuota), cuotas_totales: parseInt(f.cuotas_totales), cuotas_pagadas: parseInt(f.cuotas_pagadas) }); };
  const change = (k, v) => setF(p => ({...p, [k]: v}));

  const totalRestante = (parseInt(f.cuotas_totales) - parseInt(f.cuotas_pagadas)) * parseFloat(f.monto_cuota || 0);

  return (
    <form onSubmit={handleSubmit} style={{ display:'flex', flexDirection:'column', gap:14 }}>
      <input required placeholder="Descripción (ej: Heladera, Notebook...)" value={f.descripcion} onChange={e=>change('descripcion',e.target.value)}/>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
        <select value={f.tarjeta} onChange={e=>change('tarjeta',e.target.value)}>
          {TARJETAS.map(t=><option key={t}>{t}</option>)}
        </select>
        <select value={f.categoria} onChange={e=>change('categoria',e.target.value)}>
          {CATEGORIAS_CUOTA.map(c=><option key={c}>{c}</option>)}
        </select>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
        <div>
          <label style={{ fontSize:11, color:'var(--muted)', display:'block', marginBottom:4 }}>Monto por cuota $</label>
          <input required type="number" step="0.01" placeholder="45000" value={f.monto_cuota} onChange={e=>change('monto_cuota',e.target.value)}/>
        </div>
        <div>

// ===========================================================
const Dashboard = ({ cuotas, prestamos, gastosFijos }) => {
  const totalCuotasPendiente = useMemo(() => cuotas.filter(c=>c.activa==="SI").reduce((s,c)=>{
    const pend = parseInt(c.cuotas_totales) - parseInt(c.cuotas_pagadas);
    return s + pend * parseFloat(c.monto_cuota);
  },0), [cuotas]);

  const totalPrestamosPendiente = useMemo(() => prestamos.filter(p=>p.activo==="SI").reduce((s,p)=>{
    const pend = parseInt(p.cuotas_totales) - parseInt(p.cuotas_pagadas);
    return s + pend * parseFloat(p.monto_cuota);
  },0), [prestamos]);

  const cuotasMesActual = useMemo(() => {
    const now = new Date();
    return cuotas.filter(c => c.activa === "SI").reduce((s, c) => {
      const pagadas = parseInt(c.cuotas_pagadas);
      const totales = parseInt(c.cuotas_totales);
      if (pagadas < totales) return s + parseFloat(c.monto_cuota);
      return s;
    }, 0);
  }, [cuotas]);

  const prestamoMesActual = useMemo(() => prestamos.filter(p=>p.activo==="SI").reduce((s,p)=>{
    const pagadas = parseInt(p.cuotas_pagadas), totales = parseInt(p.cuotas_totales);
    if (pagadas < totales) return s + parseFloat(p.monto_cuota);
    return s;
  },0), [prestamos]);

  const totalFijos = useMemo(() => gastosFijos.filter(g=>g.activo==="SI").reduce((s,g)=>s+parseFloat(g.monto||0),0), [gastosFijos]);

  // Proyección próximos 6 meses de cuotas
  const proyeccion = useMemo(() => {
    const meses = [];
    const hoy = new Date();
    for (let m = 0; m < 6; m++) {
      const d = new Date(hoy.getFullYear(), hoy.getMonth() + m, 1);
      let total = 0;
      cuotas.forEach(c => {
        if (c.activa !== "SI") return;
        const p = parseInt(c.cuotas_pagadas), t = parseInt(c.cuotas_totales);
        const cuotasRestantes = t - p;
        if (cuotasRestantes > m) total += parseFloat(c.monto_cuota);
      });
      prestamos.forEach(p => {
        if (p.activo !== "SI") return;
        const pg = parseInt(p.cuotas_pagadas), tt = parseInt(p.cuotas_totales);
        if (tt - pg > m) total += parseFloat(p.monto_cuota);
      });
      const mNames = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      meses.push({ name: mNames[d.getMonth()], total });
    }
    return meses;
  }, [cuotas, prestamos]);

  const StatCard = ({ label, value, color, sub }) => (
    <div className="card" style={{ flex:1, minWidth: 140 }}>
      <p style={{ fontSize:11, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:6 }}>{label}</p>
      <p className="mono glow-red" style={{ fontSize:22, fontWeight:700, color }}>{fmt(value)}</p>
      {sub && <p style={{ fontSize:11, color:'var(--muted)', marginTop:4 }}>{sub}</p>}
    </div>
  );

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      {/* Stats */}
      <div style={{ display:'flex', gap:12, flexWrap:'wrap' }}>
        <StatCard label="Deuda cuotas" value={totalCuotasPendiente} color="var(--accent)" sub="total pendiente"/>
        <StatCard label="Préstamos" value={totalPrestamosPendiente} color="var(--accent2)" sub="total pendiente"/>
      </div>
      <div style={{ display:'flex', gap:12, flexWrap:'wrap' }}>
        <StatCard label="Este mes · Cuotas" value={cuotasMesActual} color="var(--text)" sub="aprox."/>
        <StatCard label="Este mes · Préstamos" value={prestamoMesActual} color="var(--text)" sub="aprox."/>
      </div>

      {/* Gastos fijos */}
      {totalFijos > 0 && (
        <div className="card" style={{ borderColor:'rgba(251,191,36,0.3)' }}>
          <p style={{ fontSize:11, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:6 }}>Gastos fijos mensuales</p>
          <p className="mono" style={{ fontSize:22, fontWeight:700, color:'var(--yellow)' }}>{fmt(totalFijos)}</p>
          <p style={{ fontSize:12, color:'var(--muted)', marginTop:4 }}>Estimado mensual recurrente</p>
        </div>
      )}

      {/* Total comprometido mes */}
      <div className="card" style={{ background:'rgba(244,63,94,0.06)', borderColor:'rgba(244,63,94,0.25)' }}>
        <p style={{ fontSize:11, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:6 }}>Compromisos este mes</p>
        <p className="mono" style={{ fontSize:28, fontWeight:800, color:'var(--red)' }}>{fmt(cuotasMesActual + prestamoMesActual + totalFijos)}</p>
        <p style={{ fontSize:12, color:'var(--muted)', marginTop:4 }}>Cuotas + préstamos + gastos fijos</p>
      </div>

      {/* Proyección */}
      {proyeccion.some(m=>m.total>0) && (
        <div className="card">
          <p style={{ fontWeight:700, marginBottom:16, fontSize:14 }}>📈 Proyección próximos 6 meses</p>
          <div style={{ height:180 }}>
            <ResponsiveContainer>
              <BarChart data={proyeccion} margin={{top:0,right:0,left:-10,bottom:0}}>
                <CartesianGrid strokeDasharray="3 3" stroke="var(--surface2)" vertical={false}/>
                <XAxis dataKey="name" stroke="var(--muted)" tick={{fill:'var(--muted)',fontSize:11}} axisLine={false} tickLine={false}/>
                <YAxis stroke="var(--muted)" tickFormatter={v=>`$${(v/1000).toFixed(0)}k`} tick={{fill:'var(--muted)',fontSize:10}} axisLine={false} tickLine={false}/>
                <Tooltip formatter={v=>[fmt(v),'Total']} contentStyle={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',fontSize:12}}/>
                <Bar dataKey="total" radius={[4,4,0,0]}>
                  {proyeccion.map((_, i) => <Cell key={i} fill={i===0 ? 'var(--accent)' : 'rgba(124,106,247,0.4)'}/>)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
      )}

      {/* Aviso si sin URL */}
      {EP === "https://script.google.com/macros/s/AKfycbwIZRuTnZYZIqm1GNnZuQx8LQWDuR-N7ZFiSJrTOy6pKjHp8INY90k7dUDLv5SfMgLKAg/exec" && (
        <div className="card" style={{ borderColor:'rgba(251,191,36,0.4)', background:'rgba(251,191,36,0.06)' }}>
          <div style={{ display:'flex', gap:10, alignItems:'flex-start' }}>
            <Ic.Info/>
            <div>
              <p style={{ fontWeight:700, fontSize:13, color:'var(--yellow)' }}>Configuración pendiente</p>
              <p style={{ fontSize:12, color:'var(--muted)', marginTop:4, lineHeight:1.5 }}>
                Editá el <code style={{background:'var(--surface2)',padding:'2px 6px',borderRadius:4,fontSize:11}}>const EP</code> al principio del archivo con la URL de tu Apps Script para sincronizar con Google Sheets.
              </p>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ===========================================================
// APP PRINCIPAL
// ===========================================================
function App() {
  const [tab, setTab] = useState('dashboard');
  const [cuotas, setCuotas] = useState([]);
  const [prestamos, setPrestamos] = useState([]);
  const [gastosFijos, setGastosFijos] = useState([]);
  const [gastosMes, setGastosMes] = useState([]);
  const [loading, setLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [modal, setModal] = useState(null); // 'cuota'|'prestamo'|'fijo'|'gasto'
  const [error, setError] = useState(null);

  const load = useCallback(async () => {
    if (EP === "PEGAR_URL_APPS_SCRIPT_AQUI") return;
    setLoading(true);
    setError(null);
    try {
      const [c, p, f, g] = await Promise.all([
        api({ action: 'getCuotas' }),
        api({ action: 'getPrestamos' }),
        api({ action: 'getGastosFijos' }),
        api({ action: 'getGastosMes' }),
      ]);
      if (Array.isArray(c)) setCuotas(c);
      if (Array.isArray(p)) setPrestamos(p);
      if (Array.isArray(f)) setGastosFijos(f);
      if (Array.isArray(g)) setGastosMes(g);
    } catch(e) {
      setError('No se pudo conectar con el servidor. Revisá la URL del script.');
    }
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  const handleSave = async (body) => {
    setSaving(true);
    try {
      await api({}, 'POST', body);
      await load();
      setModal(null);
    } catch(e) {
      alert('Error al guardar. Revisá la conexión.');
    }
    setSaving(false);
  };

  const handlePagarCuota = async (id) => {
    setSaving(true);
    try { await api({ action: 'pagarCuota', id }); await load(); } catch(e) {}
    setSaving(false);
  };

  const handlePagarPrestamo = async (id) => {
    setSaving(true);
    try { await api({ action: 'pagarPrestamo', id }); await load(); } catch(e) {}
    setSaving(false);
  };

  const handleDelete = async (id, sheet) => {
    if (!confirm('¿Eliminár este registro?')) return;
    setSaving(true);
    try { await api({ action: 'deleteItem', id, sheet }); await load(); } catch(e) {}
    setSaving(false);
  };

  const cuotasActivas = cuotas.filter(c => c.activa === "SI" && parseInt(c.cuotas_pagadas) < parseInt(c.cuotas_totales));
  const cuotasTerminadas = cuotas.filter(c => c.activa !== "SI" || parseInt(c.cuotas_pagadas) >= parseInt(c.cuotas_totales));
  const prestamosActivos = prestamos.filter(p => p.activo === "SI" && parseInt(p.cuotas_pagadas) < parseInt(p.cuotas_totales));

  // ---- Nav tabs ----
  const TABS = [
    { id: 'dashboard', label: 'Resumen', Icon: Ic.Dashboard },
    { id: 'cuotas', label: 'Cuotas', Icon: Ic.Card },
    { id: 'prestamos', label: 'Préstamos', Icon: Ic.Loan },
    { id: 'fijos', label: 'Fijos', Icon: Ic.Fixed },
    { id: 'consejos', label: 'Consejos', Icon: Ic.Spark },
  ];

  const modalConfig = {
    cuota: { title: '+ Nueva cuota', Form: FormCuota },
    prestamo: { title: '+ Nuevo préstamo', Form: FormPrestamo },
    fijo: { title: '+ Gasto fijo', Form: FormGastoFijo },
    gasto: { title: '+ Gasto del mes', Form: FormGastoMes },
  };

  return (
    <div style={{ minHeight:'100vh', paddingBottom:80 }}>
      {/* Header */}
      <header style={{ background:'var(--surface)', borderBottom:'1px solid var(--border)', padding:'14px 16px', position:'sticky', top:0, zIndex:30 }}>
        <div style={{ maxWidth:640, margin:'0 auto', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <div>
            <h1 style={{ fontWeight:800, fontSize:18, letterSpacing:'-0.02em' }}>
              <span style={{ color:'var(--accent)' }}>Finanzas</span>
              <span style={{ color:'var(--muted)', fontWeight:300, marginLeft:6, fontSize:15 }}>· Sole</span>
            </h1>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            {(loading || saving) && <Spinner size={16}/>}
            <button onClick={load} style={{ background:'var(--surface2)', border:'1px solid var(--border)', color:'var(--muted)', borderRadius:8, padding:'5px 10px', cursor:'pointer', fontSize:12, fontFamily:'inherit' }}>↺ Sync</button>
          </div>
        </div>
      </header>

      {/* Error */}
      {error && (
        <div style={{ background:'rgba(244,63,94,0.1)', border:'1px solid rgba(244,63,94,0.3)', borderRadius:10, margin:'12px 16px', padding:'10px 14px', fontSize:13, color:'var(--red)' }}>
          {error}

      )}

      {/* Content */}
      <main style={{ maxWidth:640, margin:'0 auto', padding:'16px 16px' }}>

        {tab === 'dashboard' && <Dashboard cuotas={cuotas} prestamos={prestamos} gastosFijos={gastosFijos}/>}

        {tab === 'cuotas' && (
          <div>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
              <h2 style={{ fontWeight:700, fontSize:16 }}>Cuotas activas <span className="badge" style={{ background:'rgba(124,106,247,0.15)', color:'var(--accent)', marginLeft:6 }}>{cuotasActivas.length}</span></h2>
              <button onClick={()=>setModal('cuota')} style={{ background:'var(--accent)', border:'none', color:'white', borderRadius:10, padding:'7px 14px', cursor:'pointer', fontSize:13, fontWeight:700, fontFamily:'inherit', display:'flex', alignItems:'center', gap:5 }}><Ic.Plus/> Nueva</button>

              <button onClick={()=>setModal('fijo')} style={{ background:'rgba(251,191,36,0.15)', border:'1px solid rgba(251,191,36,0.3)', color:'var(--yellow)', borderRadius:10, padding:'7px 14px', cursor:'pointer', fontSize:13, fontWeight:700, fontFamily:'inherit', display:'flex', alignItems:'center', gap:5 }}><Ic.Plus/> Nuevo</button>
            </div>
            {gastosFijos.filter(g=>g.activo==="SI").length === 0 && <p style={{ color:'var(--muted)', fontSize:14, textAlign:'center', padding:32 }}>Sin gastos fijos registrados</p>}
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {gastosFijos.filter(g=>g.activo==="SI").map(g=>(
                <div key={g.id} className="card" style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <div>
                    <p style={{ fontWeight:600, fontSize:14 }}>{g.descripcion}</p>
                    <div style={{ display:'flex', gap:6, marginTop:4 }}>
                      <span className="badge" style={{ background:'var(--surface2)', color:'var(--muted)' }}>{g.categoria}</span>
                      {g.dia_vencimiento && <span className="badge" style={{ background:'rgba(251,191,36,0.1)', color:'var(--yellow)' }}>vence día {g.dia_vencimiento}</span>}
                    </div>
                  </div>
                  <div style={{ textAlign:'right' }}>
                    <p className="mono" style={{ fontWeight:700, color:'var(--yellow)' }}>{fmt(g.monto)}</p>
                    <button onClick={()=>handleDelete(g.id,'GASTOS_FIJOS')} style={{ background:'none', border:'none', color:'var(--muted)', cursor:'pointer', marginTop:4, padding:0 }}><Ic.Trash/></button>
                  </div>
                </div>
              ))}
            </div>
            {/* Gastos del mes */}
            <div style={{ marginTop:24 }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
                <p style={{ fontSize:13, fontWeight:700 }}>Registro del mes</p>
                <button onClick={()=>setModal('gasto')} style={{ background:'var(--surface2)', border:'1px solid var(--border)', color:'var(--muted)', borderRadius:8, padding:'5px 12px', cursor:'pointer', fontSize:12, fontFamily:'inherit', display:'flex', alignItems:'center', gap:4 }}><Ic.Plus/>Gasto</button>
              </div>
              {gastosMes.length === 0 && <p style={{ color:'var(--muted)', fontSize:13, textAlign:'center', padding:20 }}>Sin gastos registrados este mes</p>}
              <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                {gastosMes.slice().reverse().slice(0,20).map(g=>(
                  <div key={g.id} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 14px', background:'var(--surface)', borderRadius:10, border:'1px solid var(--border)' }}>
                    <div>
                      <p style={{ fontSize:13, fontWeight:600 }}>{g.descripcion}</p>
                      <p style={{ fontSize:11, color:'var(--muted)' }}>{g.fecha} · {g.medio_pago}</p>
                    </div>
                    <div style={{ textAlign:'right', display:'flex', alignItems:'center', gap:10 }}>
                      <span className="mono" style={{ fontWeight:700, fontSize:13 }}>{fmt(g.monto)}</span>
                      <button onClick={()=>handleDelete(g.id,'GASTOS_MES')} style={{ background:'none', border:'none', color:'var(--muted)', cursor:'pointer', padding:0 }}><Ic.Trash/></button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {tab === 'consejos' && (
          <div>
            <div style={{ marginBottom:16 }}>
              <h2 style={{ fontWeight:700, fontSize:16, marginBottom:4 }}>💡 Consejos financieros</h2>
              <p style={{ fontSize:13, color:'var(--muted)' }}>Basados en tu situación actual: cuotas activas, préstamos y uso de tarjetas.</p>
            </div>
            <ConsejosPanel/>
          </div>
        )}
      </main>

      {/* Bottom Nav */}
      <nav style={{ position:'fixed', bottom:0, left:0, right:0, background:'var(--surface)', borderTop:'1px solid var(--border)', display:'flex', zIndex:30, paddingBottom:'env(safe-area-inset-bottom)' }}>
        {TABS.map(t => (
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
            gap:3, padding:'10px 0', background:'none', border:'none', cursor:'pointer',
            color: tab===t.id ? 'var(--accent)' : 'var(--muted)',
            borderTop: tab===t.id ? '2px solid var(--accent)' : '2px solid transparent',
            transition:'color 0.2s',
            fontFamily:'inherit'
          }}>
            <t.Icon/>
            <span style={{ fontSize:10, fontWeight: tab===t.id ? 700 : 400 }}>{t.label}</span>
          </button>
        ))}
      </nav>

      {/* Modals */}
      {modal && (() => {
        const cfg = modalConfig[modal];
        if (!cfg) return null;
        return (
          <Modal title={cfg.title} onClose={()=>setModal(null)}>
            <cfg.Form onSubmit={handleSave} loading={saving}/>
          </Modal>
        );
      })()}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
