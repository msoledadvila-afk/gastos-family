<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Gabi & Sole</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Recharts y sus dependencias (Para los gráficos) -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.1.9/umd/Recharts.js"></script>
    <!-- Babel (para compilar JSX en el navegador) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-200 antialiased font-sans">
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 🚨 PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT 🚨
        // ==========================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwIZRuTnZYZIqm1GNnZuQx8LQWDuR-N7ZFiSJrTOy6pKjHp8INY90k7dUDLv5SfMgLKAg/exec"; 

        const { useState, useEffect, useMemo } = React;
        const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip: RechartsTooltip, Legend, BarChart, Bar, XAxis, YAxis, CartesianGrid } = window.Recharts;

        const COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6', '#f97316'];
        const TYPE_COLORS = { 'Fijo': '#8b5cf6', 'Variable': '#10b981' };

        const TARJETAS = {
            Gabriel: ['VISA Patagonia'],
            Soledad: ['VISA Patagonia', 'MC Patagonia', 'VISA BNA']
        };

        const Icons = {
            Dashboard: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path></svg>,
            Plus: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"></path></svg>,
            List: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>,
            CheckCircle: () => <svg className="w-6 h-6 text-emerald-500 drop-shadow-[0_0_8px_rgba(16,185,129,0.5)]" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd"></path></svg>,
            Circle: () => <svg className="w-6 h-6 text-slate-500 hover:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
            Loading: () => <svg className="w-5 h-5 animate-spin text-indigo-400" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>,
            Trash: () => <span className="text-xl">🗑️</span>,
            Magic: () => <svg className="w-5 h-5 text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M5 2a1 1 0 011 1v1h1a1 1 0 010 2H6v1a1 1 0 01-2 0V6H3a1 1 0 010-2h1V3a1 1 0 011-1zm0 10a1 1 0 011 1v1h1a1 1 0 110 2H6v1a1 1 0 11-2 0v-1H3a1 1 0 110-2h1v-1a1 1 0 011-1zM12 2a1 1 0 01.967.744L14.146 7.2 17.5 9.134a1 1 0 010 1.732l-3.354 1.935-1.18 4.455a1 1 0 01-1.933 0L9.854 12.8 6.5 10.866a1 1 0 010-1.732l3.354-1.935 1.18-4.455A1 1 0 0112 2z" clipRule="evenodd"></path></svg>
        };

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [entryMode, setEntryMode] = useState('simple');
            const [filterStatus, setFilterStatus] = useState('Todos');
            const [expenses, setExpenses] = useState([]);
            const [isLoading, setIsLoading] = useState(false);

            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0],
                desc: '', amount: '', category: 'Hogar', type: 'Fijo', payer: 'Gabriel', split: 'Compartido', card: ''
            });

            const [cuotasData, setCuotasData] = useState({
                startDate: new Date().toISOString().split('T')[0],
                desc: '', totalAmount: '', totalCuotas: '6', category: 'Tarjetas', type: 'Fijo', payer: 'Soledad', split: 'Compartido', card: 'VISA Patagonia'
            });

            const loadData = async () => {
                if (!SCRIPT_URL || SCRIPT_URL === "PEGAR_TU_URL_AQUI") return;
                setIsLoading(true);
                try {
                    const response = await fetch(SCRIPT_URL);
                    const data = await response.json();
                    setExpenses(data);
                } catch (error) {
                    console.error("Error cargando datos:", error);
                }
                setIsLoading(false);
            };

            useEffect(() => { loadData(); }, []);

            const sendActionToSheet = async (dataPayload) => {
                if (SCRIPT_URL === "PEGAR_TU_URL_AQUI") {
                    alert("Por favor, pega la URL de tu Google Apps Script en el código (Línea 20).");
                    return;
                }
                setIsLoading(true);
                try {
                    const formBody = new URLSearchParams();
                    formBody.append("data", JSON.stringify(dataPayload));
                    
                    await fetch(SCRIPT_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/x-www-form-urlencoded" },
                        body: formBody.toString()
                    });
                    await loadData();
                } catch (error) {
                    console.error("Error guardando:", error);
                    setIsLoading(false);
                }
            };

            // 🌟 FUNCIÓN DE IMPORTACIÓN MÁGICA 🌟
            const cargarDatosReales = async () => {
                if (SCRIPT_URL === "PEGAR_TU_URL_AQUI") {
                    alert("Primero tenés que pegar tu SCRIPT_URL en la línea 20 del código.");
                    return;
                }
                if (!window.confirm("¿Estás seguro que querés cargar los datos de tus PDFs y Excels en tu planilla? Esto escribirá 5 nuevos gastos en tu Google Sheet.")) return;

                setIsLoading(true);
                
                // Datos exactos extraídos de tus archivos
                const datosReales = [
                    { action: "add", id: "p4_" + Date.now(), date: "2026-05-05", desc: "Préstamo Personal Nro:11624217 - Cuota 4/6", amount: 178565.81, category: "Préstamos", type: "Fijo", payer: "Soledad", split: "Personal", card: "-" },
                    { action: "add", id: "p5_" + Date.now(), date: "2026-06-05", desc: "Préstamo Personal Nro:11624217 - Cuota 5/6", amount: 177317.45, category: "Préstamos", type: "Fijo", payer: "Soledad", split: "Personal", card: "-" },
                    { action: "add", id: "p6_" + Date.now(), date: "2026-07-05", desc: "Préstamo Personal Nro:11624217 - Cuota 6/6", amount: 174208.86, category: "Préstamos", type: "Fijo", payer: "Soledad", split: "Personal", card: "-" },
                    { action: "add", id: "mc_" + Date.now(), date: "2026-04-01", desc: "Resumen Mastercard Patagonia (Cierre 19 Mar)", amount: 354995.68, category: "Tarjetas", type: "Variable", payer: "Soledad", split: "Compartido", card: "MC Patagonia" },
                    { action: "add", id: "vi_" + Date.now(), date: "2026-04-01", desc: "Resumen VISA Patagonia (Cierre 19 Mar)", amount: 185876.44, category: "Tarjetas", type: "Variable", payer: "Soledad", split: "Compartido", card: "VISA Patagonia" }
                ];

                for (const item of datosReales) {
                    try {
                        const formBody = new URLSearchParams();
                        formBody.append("data", JSON.stringify(item));
                        await fetch(SCRIPT_URL, {
                            method: "POST",
                            headers: { "Content-Type": "application/x-www-form-urlencoded" },
                            body: formBody.toString()
                        });
                    } catch (e) {
                        console.error("Error al inyectar dato:", e);
                    }
                }

                await loadData();
                setIsLoading(false);
                alert("¡Datos importados con éxito! Andá a la pestaña 'Lista' para verlos.");
            };

            const handleSimpleSubmit = async (e) => {
                e.preventDefault();
                const newExpense = {
                    action: "add",
                    id: Date.now().toString(),
                    date: formData.date,
                    desc: formData.desc,
                    amount: parseFloat(formData.amount),
                    category: formData.category,
                    type: formData.type,
                    payer: formData.payer,
                    split: formData.split,
                    card: formData.card
                };
                await sendActionToSheet(newExpense);
                setFormData({ ...formData, desc: '', amount: '' });
                setActiveTab('list');
                setFilterStatus('Pendientes');
            };

            const handleCuotasSubmit = async (e) => {
                e.preventDefault();
                let currentDate = new Date(cuotasData.startDate);
                const total = parseInt(cuotasData.totalCuotas);
                const amountPerCuota = parseFloat(cuotasData.totalAmount) / total;

                setIsLoading(true);
                for (let i = 1; i <= total; i++) {
                    const dateString = currentDate.toISOString().split('T')[0];
                    const cuotaExp = {
                        action: "add",
                        id: Date.now().toString() + i,
                        date: dateString,
                        desc: `${cuotasData.desc} (Cuota ${i}/${total})`,
                        amount: parseFloat(amountPerCuota.toFixed(2)),
                        category: cuotasData.category,
                        type: cuotasData.type,
                        payer: cuotasData.payer,
                        split: cuotasData.split,
                        card: cuotasData.card
                    };
                    
                    const formBody = new URLSearchParams();
                    formBody.append("data", JSON.stringify(cuotaExp));
                    await fetch(SCRIPT_URL, { method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: formBody.toString() });
                    
                    currentDate.setMonth(currentDate.getMonth() + 1);
                }
                await loadData();
                setCuotasData({ ...cuotasData, desc: '', totalAmount: '' });
                setActiveTab('list');
                setFilterStatus('Pendientes');
            };

            const toggleStatus = (id) => sendActionToSheet({ action: "updateStatus", id: id });
            const deleteExpense = (id) => { if(confirm("¿Seguro que querés eliminar este gasto permanentemente?")) sendActionToSheet({ action: "delete", id: id }); };

            const formatCurrency = (val) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' }).format(val);

            const dashboardStats = useMemo(() => {
                let pending = 0, paid = 0;
                let categoryTotals = {};
                let typeTotals = { 'Fijo': 0, 'Variable': 0 };
                let projectionMap = {};

                expenses.forEach(exp => {
                    const amt = parseFloat(exp.amount || 0);
                    
                    if (exp.status === 'Pendiente') {
                        pending += amt;
                        if (exp.date) {
                            const [y, m] = exp.date.split('-');
                            const monthYear = `${y}-${m}`;
                            projectionMap[monthYear] = (projectionMap[monthYear] || 0) + amt;
                        }
                    }
                    if (exp.status === 'Pagado') paid += amt;

                    if (categoryTotals[exp.category]) categoryTotals[exp.category] += amt;
                    else categoryTotals[exp.category] = amt;

                    if (exp.type && typeTotals[exp.type] !== undefined) typeTotals[exp.type] += amt;
                });

                const categoryData = Object.keys(categoryTotals).map(key => ({ name: key, value: categoryTotals[key] }));
                const typeData = Object.keys(typeTotals).map(key => ({ name: key, value: typeTotals[key] }));
                
                const projectionData = Object.keys(projectionMap).sort().map(key => {
                    const [year, month] = key.split('-');
                    const monthNames = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
                    return { name: `${monthNames[parseInt(month) - 1]} ${year.substring(2)}`, amount: projectionMap[key] };
                });

                return { pending, paid, categoryData, typeData, projectionData };
            }, [expenses]);

            const CustomTooltip = ({ active, payload, label }) => {
                if (active && payload && payload.length) {
                    return (
                        <div className="bg-slate-800 border border-slate-700 p-3 rounded-lg shadow-xl text-slate-200 text-sm">
                            <p className="font-semibold mb-1">{label || payload[0].name}</p>
                            <p className="text-indigo-400 font-bold">{formatCurrency(payload[0].value)}</p>
                        </div>
                    );
                }
                return null;
            };

            const filteredExpenses = expenses
                .filter(exp => filterStatus === 'Todos' ? true : exp.status === filterStatus)
                .sort((a,b) => new Date(a.date) - new Date(b.date));

            return (
                <div className="pb-20">
                    {/* Header */}
                    <header className="bg-slate-950 border-b border-slate-800 p-4 sticky top-0 z-20">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl md:text-2xl font-bold flex items-center gap-2 text-indigo-400">
                                📊 Finanzas Gabi & Sole
                            </h1>
                            <div className="flex items-center gap-3">
                                {isLoading && <Icons.Loading />}
                                <div className="text-xs font-medium bg-slate-800 text-slate-400 px-3 py-1.5 rounded-full border border-slate-700">Arg 🇦🇷</div>
                            </div>
                        </div>
                    </header>

                    {/* Nav */}
                    <nav className="bg-slate-900 border-b border-slate-800 sticky top-[68px] z-10 backdrop-blur-md bg-opacity-90">
                        <div className="max-w-4xl mx-auto flex">
                            <button onClick={() => setActiveTab('dashboard')} className={`flex-1 py-4 flex justify-center items-center gap-2 border-b-2 transition-all ${activeTab === 'dashboard' ? 'border-indigo-500 text-indigo-400 font-semibold' : 'border-transparent text-slate-500'}`}>
                                <Icons.Dashboard /> Dash
                            </button>
                            <button onClick={() => setActiveTab('add')} className={`flex-1 py-4 flex justify-center items-center gap-2 border-b-2 transition-all ${activeTab === 'add' ? 'border-indigo-500 text-indigo-400 font-semibold' : 'border-transparent text-slate-500'}`}>
                                <Icons.Plus /> Cargar
                            </button>
                            <button onClick={() => setActiveTab('list')} className={`flex-1 py-4 flex justify-center items-center gap-2 border-b-2 transition-all ${activeTab === 'list' ? 'border-indigo-500 text-indigo-400 font-semibold' : 'border-transparent text-slate-500'}`}>
                                <Icons.List /> Lista
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto p-4 py-8">
                        
                        {/* DASHBOARD */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6 animate-in fade-in">
                                
                                {/* BOTÓN DE IMPORTACIÓN MÁGICA (Aparece si hay pocos gastos) */}
                                {expenses.length < 6 && (
                                    <div className="bg-indigo-900/40 border border-indigo-500/50 p-6 rounded-2xl flex flex-col items-center text-center shadow-lg">
                                        <h3 className="text-xl font-bold text-indigo-300 mb-2 flex items-center gap-2">
                                            <Icons.Magic /> Importación de tus Archivos
                                        </h3>
                                        <p className="text-slate-300 mb-4 text-sm">Detectamos que tu base está limpia. ¿Querés que la App inyecte en el Google Sheet las 3 cuotas pendientes del Préstamo de Soledad y los saldos de la VISA y Mastercard de Abril automáticamente?</p>
                                        <button onClick={cargarDatosReales} disabled={isLoading} className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2.5 px-6 rounded-xl transition-all flex items-center gap-2 shadow-md">
                                            {isLoading ? <Icons.Loading /> : <Icons.Plus />} Inyectar Datos Reales en el Sheet
                                        </button>
                                    </div>
                                )}
                                
                                {/* Tarjetas Resumen */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="bg-slate-800/50 p-6 rounded-2xl border border-slate-700/50 flex flex-col justify-center items-center">
                                        <p className="text-slate-400 text-sm font-semibold uppercase tracking-wider mb-2">Deuda Pendiente</p>
                                        <h2 className="text-4xl font-bold text-rose-400">{formatCurrency(dashboardStats.pending)}</h2>
                                    </div>
                                    <div className="bg-slate-800/50 p-6 rounded-2xl border border-slate-700/50 flex flex-col justify-center items-center">
                                        <p className="text-slate-400 text-sm font-semibold uppercase tracking-wider mb-2">Total Pagado</p>
                                        <h2 className="text-4xl font-bold text-emerald-400">{formatCurrency(dashboardStats.paid)}</h2>
                                    </div>
                                </div>

                                {/* Gráficos */}
                                {expenses.length > 0 && (
                                    <>
                                        <div className="bg-slate-800/50 p-6 rounded-2xl border border-slate-700/50">
                                            <h3 className="text-lg font-bold text-slate-200 mb-6 flex items-center gap-2">
                                                📈 Proyección de Vencimientos
                                            </h3>
                                            <div className="h-72 w-full">
                                                <ResponsiveContainer>
                                                    <BarChart data={dashboardStats.projectionData} margin={{ top: 10, right: 10, left: 0, bottom: 0 }}>
                                                        <CartesianGrid strokeDasharray="3 3" stroke="#334155" vertical={false} />
                                                        <XAxis dataKey="name" stroke="#94a3b8" tick={{fill: '#94a3b8', fontSize: 12}} axisLine={false} tickLine={false} />
                                                        <YAxis stroke="#94a3b8" tickFormatter={(val) => `$${val/1000}k`} tick={{fill: '#94a3b8', fontSize: 12}} axisLine={false} tickLine={false} width={60} />
                                                        <RechartsTooltip content={<CustomTooltip />} cursor={{fill: '#334155', opacity: 0.4}} />
                                                        <Bar dataKey="amount" fill="#6366f1" radius={[4, 4, 0, 0]}>
                                                            {dashboardStats.projectionData.map((entry, index) => (
                                                                <Cell key={`cell-${index}`} fill={index === 0 ? '#ec4899' : '#6366f1'} />
                                                            ))}
                                                        </Bar>
                                                    </BarChart>
                                                </ResponsiveContainer>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="bg-slate-800/50 p-6 rounded-2xl border border-slate-700/50">
                                                <h3 className="text-sm font-bold text-slate-300 mb-4 uppercase tracking-wider text-center">Por Categorías</h3>
                                                <div className="h-64 w-full">
                                                    <ResponsiveContainer>
                                                        <PieChart>
                                                            <Pie data={dashboardStats.categoryData} innerRadius={55} outerRadius={80} paddingAngle={5} dataKey="value" stroke="none">
                                                                {dashboardStats.categoryData.map((entry, index) => (
                                                                    <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                                                                ))}
                                                            </Pie>
                                                            <RechartsTooltip content={<CustomTooltip />} />
                                                        </PieChart>
                                                    </ResponsiveContainer>
                                                </div>
                                            </div>
                                            <div className="bg-slate-800/50 p-6 rounded-2xl border border-slate-700/50">
                                                <h3 className="text-sm font-bold text-slate-300 mb-4 uppercase tracking-wider text-center">Fijos vs Variables</h3>
                                                <div className="h-64 w-full">
                                                    <ResponsiveContainer>
                                                        <PieChart>
                                                            <Pie data={dashboardStats.typeData} innerRadius={0} outerRadius={80} paddingAngle={2} dataKey="value" stroke="none">
                                                                {dashboardStats.typeData.map((entry, index) => (
                                                                    <Cell key={`cell-${index}`} fill={TYPE_COLORS[entry.name] || '#94a3b8'} />
                                                                ))}
                                                            </Pie>
                                                            <RechartsTooltip content={<CustomTooltip />} />
                                                            <Legend verticalAlign="bottom" height={36} wrapperStyle={{color: '#cbd5e1', fontSize: '14px'}}/>
                                                        </PieChart>
                                                    </ResponsiveContainer>
                                                </div>
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>
                        )}

                        {/* CARGAR GASTO */}
                        {activeTab === 'add' && (
                            <div className="max-w-xl mx-auto bg-slate-800/80 p-6 rounded-2xl border border-slate-700 shadow-xl">
                                <div className="flex bg-slate-900 rounded-xl p-1 mb-6">
                                    <button onClick={() => setEntryMode('simple')} className={`flex-1 py-2 rounded-lg font-bold ${entryMode === 'simple' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>Gasto Simple</button>
                                    <button onClick={() => setEntryMode('cuotas')} className={`flex-1 py-2 rounded-lg font-bold ${entryMode === 'cuotas' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>Plan Cuotas</button>
                                </div>

                                {entryMode === 'simple' ? (
                                    <form onSubmit={handleSimpleSubmit} className="space-y-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <input type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="w-full p-3 bg-slate-900/50 border border-slate-600 rounded-xl text-slate-200" required />
                                            <input type="number" step="0.01" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} placeholder="Monto $" className="w-full p-3 bg-slate-900/50 border border-slate-600 rounded-xl text-slate-200" required />
                                        </div>
                                        <input type="text" value={formData.desc} onChange={e => setFormData({...formData, desc: e.target.value})} placeholder="Descripción..." className="w-full p-3 bg-slate-900/50 border border-slate-600 rounded-xl text-slate-200" required />
                                        <div className="grid grid-cols-2 gap-4">
                                            <select value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="w-full p-3 bg-slate-900/50 border border-slate-600 rounded-xl text-slate-200">
                                                <option>Hogar</option><option>Supermercado</option><option>Auto</option><option>Tarjetas</option><option>Préstamos</option><option>Otros</option>
                                            </select>
                                            <select value={formData.type} onChange={e => setFormData({...formData, type: e.target.value})} className="w-full p-3 bg-slate-900/50 border border-slate-600 rounded-xl text-slate-200">
                                                <option>Fijo</option><option>Variable</option>
                                            </select>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                             <select value={formData.payer} onChange={e => setFormData({...formData, payer: e.target.value})} className="w-full p-3 bg-slate-900/50 border border-slate-600 rounded-xl text-slate-200">
                                                <option>Gabriel</option><option>Soledad</option>
                                            </select>
                                            <select value={formData.split} onChange={e => setFormData({...formData, split: e.target.value})} className="w-full p-3 bg-slate-900/50 border border-slate-600 rounded-xl text-slate-200">
                                                <option>Compartido</option><option>Personal</option>
                                            </select>
                                        </div>
                                        <button type="submit" disabled={isLoading} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl mt-4">Guardar Gasto</button>
                                    </form>
                                ) : (
                                    <form onSubmit={handleCuotasSubmit} className="space-y-4">
                                        <input type="text" value={cuotasData.desc} onChange={e => setCuotasData({...cuotasData, desc: e.target.value})} placeholder="Descripción de la compra..." className="w-full p-3 bg-slate-900/50 border border-slate-600 rounded-xl text-slate-200" required />
                                        <div className="grid grid-cols-2 gap-4">
                                            <input type="number" step="0.01" value={cuotasData.totalAmount} onChange={e => setCuotasData({...cuotasData, totalAmount: e.target.value})} placeholder="Monto TOTAL $" className="w-full p-3 bg-slate-900/50 border border-slate-600 rounded-xl text-slate-200" required />
                                            <select value={cuotasData.totalCuotas} onChange={e => setCuotasData({...cuotasData, totalCuotas: e.target.value})} className="w-full p-3 bg-slate-900/50 border border-slate-600 rounded-xl text-slate-200">
                                                {[2,3,6,9,12,18,24].map(n => <option key={n} value={n}>{n} Cuotas</option>)}
                                            </select>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <select value={cuotasData.category} onChange={e => setCuotasData({...cuotasData, category: e.target.value})} className="w-full p-3 bg-slate-900/50 border border-slate-600 rounded-xl text-slate-200">
                                                <option>Hogar</option><option>Supermercado</option><option>Auto</option><option>Tarjetas</option><option>Préstamos</option><option>Otros</option>
                                            </select>
                                            <select value={cuotasData.type} onChange={e => setCuotasData({...cuotasData, type: e.target.value})} className="w-full p-3 bg-slate-900/50 border border-slate-600 rounded-xl text-slate-200">
                                                <option>Fijo</option><option>Variable</option>
                                            </select>
                                        </div>
                                        {cuotasData.totalAmount && (
                                            <div className="text-emerald-400 font-bold bg-emerald-900/20 p-3 rounded-lg text-center">
                                                Quedarán cuotas de: {formatCurrency(cuotasData.totalAmount / cuotasData.totalCuotas)}
                                            </div>
                                        )}
                                        <div className="grid grid-cols-2 gap-4">
                                             <select value={cuotasData.payer} onChange={e => setCuotasData({...cuotasData, payer: e.target.value, card: TARJETAS[e.target.value][0]})} className="w-full p-3 bg-slate-900/50 border border-slate-600 rounded-xl text-slate-200">
                                                <option value="Gabriel">Gabriel</option><option value="Soledad">Soledad</option>
                                            </select>
                                             <select value={cuotasData.card} onChange={e => setCuotasData({...cuotasData, card: e.target.value})} className="w-full p-3 bg-slate-900/50 border border-slate-600 rounded-xl text-slate-200">
                                                {TARJETAS[cuotasData.payer].map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <input type="date" value={cuotasData.startDate} onChange={e => setCuotasData({...cuotasData, startDate: e.target.value})} className="w-full p-3 bg-slate-900/50 border border-slate-600 rounded-xl text-slate-200" required />
                                        <button type="submit" disabled={isLoading} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl mt-4">Generar Cuotas</button>
                                    </form>
                                )}
                            </div>
                        )}

                        {/* LISTA */}
                        {activeTab === 'list' && (
                            <div className="bg-slate-800/80 rounded-2xl border border-slate-700 overflow-hidden">
                                <div className="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-900/50">
                                    <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} className="bg-slate-800 text-slate-200 p-2 rounded-lg border border-slate-600 outline-none">
                                        <option value="Todos">Todos</option>
                                        <option value="Pendiente">Solo Pendientes</option>
                                        <option value="Pagado">Solo Pagados</option>
                                    </select>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm">
                                        <tbody>
                                            {filteredExpenses.map((exp) => (
                                                <tr key={exp.id} className={`border-b border-slate-700/50 ${exp.status === 'Pagado' ? 'opacity-50' : ''}`}>
                                                    <td className="p-4">
                                                        <button onClick={() => toggleStatus(exp.id)}>
                                                            {exp.status === 'Pagado' ? <Icons.CheckCircle /> : <Icons.Circle />}
                                                        </button>
                                                    </td>
                                                    <td className="p-4 whitespace-nowrap text-slate-300">{new Date(exp.date).toLocaleDateString('es-AR', {day:'2-digit', month:'short'})}</td>
                                                    <td className="p-4 w-full">
                                                        <div className="font-bold text-slate-200">{exp.desc}</div>
                                                        <div className="text-xs text-slate-400 mt-1">{exp.payer} {exp.card !== '-' ? `• ${exp.card}` : ''}</div>
                                                    </td>
                                                    <td className={`p-4 font-bold text-right ${exp.status === 'Pagado' ? 'line-through' : 'text-indigo-300'}`}>
                                                        {formatCurrency(exp.amount)}
                                                    </td>
                                                    <td className="p-4">
                                                        <button onClick={() => deleteExpense(exp.id)} className="text-slate-600 hover:text-rose-500"><Icons.Trash /></button>
                                                    </td>
                                                </tr>
                                            ))}
                                            {filteredExpenses.length === 0 && (
                                                <tr><td colSpan="5" className="p-8 text-center text-slate-500">No hay datos.</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
